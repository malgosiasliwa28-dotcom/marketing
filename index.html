<!doctype html>
<html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketing Hub</title><style>
:root{--bg:#f4f7fb;--card:#fff;--text:#172033;--mut:#64748b;--line:#e5ebf3;--a:#2563eb;--b:#7c3aed;--side:280px}body.dark{--bg:#0f172a;--card:#111827;--text:#e5e7eb;--mut:#9ca3af;--line:#26334f}body.rose{--a:#e11d48;--b:#f97316}body.forest{--a:#059669;--b:#84cc16}body.violet{--a:#7c3aed;--b:#06b6d4}*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;font-family:Inter,system-ui,Segoe UI,Arial;background:radial-gradient(circle at 10% 12%,#60a5fa33,transparent 26%),radial-gradient(circle at 85% 8%,#f472b633,transparent 25%),var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.btn{border:0;border-radius:14px;padding:10px 13px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-weight:800;cursor:pointer}.btn.sec{background:var(--card);color:var(--text);border:1px solid var(--line)}.btn.del{background:linear-gradient(135deg,#ef4444,#f97316)}.btn.sm{font-size:12px;padding:7px 9px;border-radius:10px}.inp{width:100%;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:14px;padding:11px}.hint{color:var(--mut);font-size:13px}.login{height:100vh;display:grid;place-items:center;padding:20px}.log{width:min(860px,100%);display:grid;grid-template-columns:1fr 1fr;background:#ffffffcc;border:1px solid #fff8;border-radius:28px;overflow:hidden;box-shadow:0 24px 70px #0f172a22}.dark .log{background:#111827cc;border-color:#26334f}.hero{padding:42px;background:linear-gradient(135deg,var(--a),var(--b));color:white}.hero h1{font-size:40px;line-height:1;margin:20px 0}.form{padding:42px;display:flex;flex-direction:column;gap:14px}.brand{display:flex;align-items:center;gap:10px;font-weight:900}.mark,.av{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--a),var(--b));display:grid;place-items:center;color:white;font-weight:900}.app{height:100vh;display:grid;grid-template-columns:var(--side) minmax(0,1fr);overflow:hidden}.side{height:100vh;overflow:auto;padding:18px;background:#ffffffbf;border-right:1px solid var(--line);backdrop-filter:blur(18px)}.dark .side{background:#0f172abf}.prof{display:flex;gap:10px;align-items:center;margin:16px 0;padding:12px;border:1px solid var(--line);border-radius:18px;background:var(--card)}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:999px;padding:7px 10px;font-weight:800;cursor:pointer}.tab.on{background:var(--text);color:var(--bg)}.nav{display:flex;flex-direction:column;gap:5px}.nav button{border:0;background:transparent;color:var(--mut);font-weight:850;text-align:left;border-radius:14px;padding:11px;cursor:pointer}.nav button.on,.nav button:hover{background:#2563eb18;color:var(--text)}.main{height:100vh;overflow:auto;padding:20px 24px 42px}.top{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:1fr auto auto;gap:10px;padding-bottom:16px;background:linear-gradient(to bottom,var(--bg) 82%,transparent)}h1{margin:0;font-size:32px;letter-spacing:-.04em}.title{display:flex;justify-content:space-between;gap:12px;align-items:end;margin:8px 0 18px}.grid{display:grid;gap:14px}.c4{grid-template-columns:repeat(4,1fr)}.c3{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:repeat(2,1fr)}.card{background:#ffffffd9;border:1px solid var(--line);border-radius:22px;box-shadow:0 20px 55px #0f172a12;padding:17px}.dark .card{background:#111827d9}.metric b{font-size:30px}.item{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);background:color-mix(in srgb,var(--card),var(--bg) 18%);border-radius:16px;padding:11px;margin:8px 0}.item h4{margin:0 0 4px}.item p{margin:0;color:var(--mut);font-size:13px}.chip{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--mut);font-size:12px;font-weight:850}.ok{color:#047857;background:#10b9811f}.warn{color:#b45309;background:#f59e0b20}.kanban{display:grid;grid-template-columns:repeat(4,minmax(210px,1fr));gap:12px;overflow:auto}.col{border:1px solid var(--line);background:color-mix(in srgb,var(--card),var(--bg) 25%);border-radius:18px;padding:12px;min-height:250px}.task{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px;margin:8px 0;cursor:grab}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:9px}.day{min-height:94px;border:1px solid var(--line);background:color-mix(in srgb,var(--card),var(--bg) 20%);border-radius:15px;padding:8px}.pill{font-size:11px;border-radius:9px;background:#2563eb20;padding:5px;margin-top:5px}.drop{border:2px dashed var(--a);border-radius:18px;padding:20px;text-align:center;background:#2563eb12;cursor:pointer}.board{position:relative;min-height:500px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(90deg,#94a3b824 1px,transparent 1px),linear-gradient(#94a3b824 1px,transparent 1px);background-size:26px 26px;overflow:hidden}.note{position:absolute;min-width:175px;max-width:250px;padding:13px;border-radius:16px;background:#fef3c7;color:#3f2f00;box-shadow:0 18px 34px #0002;cursor:move}.pink{background:#fce7f3}.blue{background:#dbeafe}.green{background:#dcfce7}.modal{position:fixed;inset:0;background:#0f172a99;display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.modal.on{display:flex}.box{width:min(680px,100%);max-height:90vh;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.sw{height:55px;border-radius:16px;border:2px solid var(--line);cursor:pointer}.ocean{background:linear-gradient(135deg,#2563eb,#06b6d4)}.rose{background:linear-gradient(135deg,#e11d48,#f97316)}.forest{background:linear-gradient(135deg,#059669,#84cc16)}.violet{background:linear-gradient(135deg,#7c3aed,#06b6d4)}@media(max-width:980px){:root{--side:88px}.side{padding:12px}.brand span,.prof div:not(.av),.nav span,.hide{display:none}.nav button{text-align:center}.c4,.c3{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){body{height:auto;overflow:auto}.app{height:auto;grid-template-columns:1fr}.side{height:auto;display:flex;gap:8px;overflow:auto;border-right:0;border-bottom:1px solid var(--line)}.brand,.prof{display:none}.nav{flex-direction:row}.main{height:auto}.top,.c4,.c3,.c2,.fg,.kanban,.cal{grid-template-columns:1fr}}
</style></head><body><div id="root"></div><script>
const KEY='marketing-hub-v1',ME='u-gosia';const uid=()=>Math.random().toString(36).slice(2,9),today=()=>new Date().toISOString().slice(0,10);const labels={dash:'🏠 Dashboard',cal:'📅 Kalendarz',projects:'📁 Projekty',tasks:'✅ Zadania',social:'📱 Social Media',creative:'🎨 Kreacje',events:'🎤 Wydarzenia',partners:'🤝 Partnerzy',materials:'📦 Materiały',finance:'💳 Finanse',checks:'☑️ Checklisty',notes:'📝 Notatki',reports:'📊 Raporty',settings:'⚙️ Ustawienia'};
const seed={auth:null,view:'dash',panel:'Ogólny',q:'',theme:'ocean',mode:'light',users:[{id:ME,name:'Gosia',email:'gosia@felg.app',role:'Właściciel'}],projects:[{id:'p1',name:'Kampania webinarowa',type:'kampania',status:'W trakcie',due:'2026-07-10',budget:4200,desc:'Mailing, social i materiały.'},{id:'p2',name:'Materiały targowe',type:'projekt',status:'Planowanie',due:'2026-08-04',budget:9800,desc:'Roll-upy, katalogi, gadżety.'}],tasks:[{id:'t1',title:'Przygotować mailing',status:'Do zrobienia',prio:'Wysoki',due:'2026-06-27',panel:'Ogólny',project:'p1'},{id:'t2',title:'Brief grafik webinarowych',status:'W trakcie',prio:'Wysoki',due:'2026-06-26',panel:'Kreacje',project:'p1'},{id:'t3',title:'Rozpisać 6 postów',status:'Do sprawdzenia',prio:'Normalny',due:'2026-06-29',panel:'Social',project:'p1'}],events:[{id:'e1',name:'Webinar Rejestracja 2.0',type:'Webinar',date:'2026-07-10',status:'W przygotowaniu'},{id:'e2',name:'Targi medyczne',type:'Targi',date:'2026-08-04',status:'Planowanie'}],partners:[{id:'pa1',name:'Drukarnia Premium Print',type:'Drukarnia',person:'Marta',email:'druk@example.pl',phone:'500111222',notes:'Katalogi i roll-upy'},{id:'pa2',name:'FotoMed Studio',type:'Fotograf',person:'Adam',email:'foto@example.pl',phone:'500333444',notes:'Sesje eventowe'}],files:[],dropbox:[{id:'d1',name:'Dropbox — grafiki social',url:'https://dropbox.com',cat:'Social'},{id:'d2',name:'Dropbox — zdjęcia',url:'https://dropbox.com',cat:'Zdjęcia'}],warehouse:[{id:'w1',name:'Roll-up FELG Dent',place:'Garaż',qty:3,min:1,cat:'Targi'},{id:'w2',name:'Smycze',place:'Biuro',qty:120,min:50,cat:'Gadżety'}],finance:[{id:'f1',name:'Meta Ads',type:'Koszt kampanii',status:'Do opłacenia',amount:1200,due:'2026-06-30'},{id:'f2',name:'Canva Pro',type:'Narzędzie płatne',status:'Subskrypcja',amount:55,due:'2026-07-01'},{id:'f3',name:'Dropbox Business',type:'Subskrypcja',status:'Subskrypcja',amount:89,due:'2026-07-05'}],social:[{id:'s1',channel:'LinkedIn',title:'Post zapraszający na webinar',status:'Draft',date:'2026-06-28'}],creative:[{id:'c1',name:'Key visual webinaru',format:'LinkedIn + mailing',status:'Brief',due:'2026-06-27'}],templates:[{id:'ct1',name:'Webinar',items:['Formularz zapisu','Mailing','Grafiki','Prezentacja','Przypomnienie 24h','Nagranie','Mail po wydarzeniu']},{id:'ct2',name:'Targi',items:['Zgłoszenie','Opłata','Stoisko','Roll-upy','Katalogi','Gadżety','Transport','Raport']}],assigned:[{id:'ac1',name:'Checklista webinaru',items:[{t:'Formularz zapisu',d:true},{t:'Mailing',d:false},{t:'Grafiki',d:false},{t:'Prezentacja',d:false}]}],notes:[{id:'n1',owner:ME,vis:'private',title:'Moje pomysły',body:'Cykliczny webinar edukacyjny.',x:70,y:70,c:'pink'},{id:'n2',owner:ME,vis:'shared',title:'Wspólne',body:'Do każdego linku dodawać UTM.',x:330,y:150,c:'blue'}]};
let s=load();function load(){try{return {...seed,...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch(e){return structuredClone(seed)}}function save(){localStorage.setItem(KEY,JSON.stringify(s))}function esc(x){return String(x??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function body(){document.body.className=(s.mode==='dark'?'dark ':'')+s.theme}function r(){body();root.innerHTML=s.auth?app():login();bind()}function login(){return `<div class="login"><div class="log"><div class="hero"><div class="brand"><b class="mark">M</b><span>Marketing Hub</span></div><h1>Centrum pracy marketingu</h1><p>Projekty, kampanie, kalendarz, social, kreacje, partnerzy, magazyn, finanse, checklisty i prywatne notatki.</p><p>Landingi są usunięte — robicie je na innej platformie.</p></div><div class="form"><h2>Logowanie</h2><input id="email" class="inp" value="gosia@felg.app"><p id="err" class="hint"></p><button id="log" class="btn">Wejdź</button></div></div></div>`}
function app(){return `<div class="app"><aside class="side"><div class="brand"><b class="mark">M</b><span>Marketing Hub<br><small class="hint">FELG workspace</small></span></div><div class="prof"><div class="av">G</div><div><b>Gosia</b><br><small class="hint">Właściciel</small></div></div><div class="tabs"><button class="tab ${s.panel==='Ogólny'?'on':''}" data-panel="Ogólny">Ogólny</button><button class="tab ${s.panel==='Social'?'on':''}" data-panel="Social">Social</button><button class="tab ${s.panel==='Kreacje'?'on':''}" data-panel="Kreacje">Kreacje</button></div><nav class="nav">${Object.keys(labels).map(k=>`<button data-v="${k}" class="${s.view===k?'on':''}"><b>${labels[k].split(' ')[0]}</b><span>${labels[k].slice(2)}</span></button>`).join('')}</nav></aside><main class="main"><div class="top"><input id="q" class="inp" placeholder="Szukaj w aplikacji" value="${esc(s.q)}"><button class="btn" onclick="openM('task')">+ Utwórz</button><button id="out" class="btn sec">Wyloguj</button></div>${view()}</main></div>${modal()}`}
function T(a,b,c=''){return `<div class="title"><div><h1>${a}</h1><p class="hint">${b}</p></div>${c}</div>`}function item(a,b,c=''){return `<div class="item"><div><h4>${esc(a)}</h4><p>${esc(b)}</p></div>${c}</div>`}function act(col,id){return `<button class="btn sm del" onclick="del('${col}','${id}')">Usuń</button>`}function view(){return({dash,cal,projects,tasks,social,creative,events,partners,materials,finance,checks,notes,reports,settings}[s.view]||dash)()}function q(arr,fields){let v=s.q.toLowerCase();return !v?arr:arr.filter(x=>fields.some(f=>String(x[f]||'').toLowerCase().includes(v)))}
function dash(){let cost=s.finance.reduce((a,b)=>a+ +b.amount,0);return T('Dashboard Gosi','Wspólna przestrzeń marketingu. Prywatne notatki widzisz tylko Ty.')+`<div class="grid c4"><div class="card metric"><small class="hint">Zadania</small><br><b>${s.tasks.length}</b></div><div class="card metric"><small class="hint">Wydarzenia</small><br><b>${s.events.length}</b></div><div class="card metric"><small class="hint">Partnerzy</small><br><b>${s.partners.length}</b><br><span class="chip">bez klientów</span></div><div class="card metric"><small class="hint">Koszty</small><br><b>${cost} zł</b></div></div><div class="grid c3" style="margin-top:14px"><div class="card"><h2>Priorytety</h2>${q(s.tasks,['title','status','panel']).map(t=>item(t.title,`${t.status} · ${t.prio} · ${t.due}`,act('tasks',t.id))).join('')}</div><div class="card"><h2>Wydarzenia</h2>${s.events.map(e=>item(e.name,`${e.type} · ${e.date}`,act('events',e.id))).join('')}</div><div class="card"><h2>Szybkie akcje</h2><button class="btn sec" onclick="openM('social')">Post</button> <button class="btn sec" onclick="openM('creative')">Brief</button> <button class="btn sec" onclick="openM('note')">Notatka</button></div></div>`}
function cal(){return T('Kalendarz','Wszystkie działania marketingowe.',`<button class="btn" onclick="openM('event')">+ Wydarzenie</button>`)+`<div class="card"><div class="cal">${Array.from({length:28},(_,i)=>i+1).map(d=>{let date='2026-07-'+String(d).padStart(2,'0'),ev=s.events.filter(x=>x.date===date).concat(s.social.filter(x=>x.date===date).map(x=>({name:x.title,type:x.channel})));return `<div class="day"><b>${d}</b>${ev.map(x=>`<div class="pill">${x.type}: ${x.name}</div>`).join('')}</div>`}).join('')}</div></div>`}
function projects(){return T('Projekty i kampanie','Cele, terminy, statusy i budżety.',`<button class="btn" onclick="openM('project')">+ Projekt</button>`)+`<div class="grid c2">${q(s.projects,['name','status','desc']).map(p=>`<div class="card"><div style="display:flex;justify-content:space-between;gap:8px"><div><span class="chip">${p.type}</span><h2>${esc(p.name)}</h2></div>${act('projects',p.id)}</div><p>${esc(p.desc)}</p><p><b>${p.status}</b> · ${p.due} · ${p.budget} zł</p></div>`).join('')}</div>`}
function tasks(){let cols=['Do zrobienia','W trakcie','Do sprawdzenia','Gotowe'];return T('Zadania','Kanban z przeciąganiem i usuwaniem.',`<button class="btn" onclick="openM('task')">+ Zadanie</button>`)+`<div class="kanban">${cols.map(c=>`<div class="col" ondragover="event.preventDefault()" ondrop="dropT(event,'${c}')"><h3>${c}</h3>${q(s.tasks,['title','status','panel']).filter(t=>t.status===c).map(t=>`<div class="task" draggable="true" ondragstart="dragT(event,'${t.id}')"><b>${esc(t.title)}</b><p class="hint">${t.prio} · ${t.due} · ${t.panel}</p>${act('tasks',t.id)}</div>`).join('')}</div>`).join('')}</div>`}
function social(){return T('Social Media','Panel social media w tej samej aplikacji.',`<button class="btn" onclick="openM('social')">+ Post</button>`)+`<div class="grid c3"><div class="card"><h2>Plan publikacji</h2>${q(s.social,['title','channel','status']).map(x=>item(x.title,`${x.channel} · ${x.date} · ${x.status}`,act('social',x.id))).join('')}</div><div class="card"><h2>UTM Builder</h2><input id="u" class="inp" placeholder="URL"><br><br><input id="src" class="inp" placeholder="source"><br><br><input id="camp" class="inp" placeholder="campaign"><br><br><button class="btn" onclick="utm()">Generuj</button><p id="uo" class="hint"></p></div><div class="card"><h2>Pomysły</h2>${['Koszt pustego fotela','5 automatyzacji recepcji','Case study'].map(x=>item(x,'pomysł contentowy')).join('')}</div></div>`}
function creative(){return T('Kreacje i grafiki','Briefy, formaty i statusy.',`<button class="btn" onclick="openM('creative')">+ Brief</button>`)+`<div class="grid c2">${q(s.creative,['name','format','status']).map(x=>`<div class="card"><span class="chip">${x.status}</span><h2>${esc(x.name)}</h2><p>${esc(x.format)}</p><p class="hint">Deadline ${x.due}</p>${act('creative',x.id)}</div>`).join('')}</div>`}
function events(){return T('Wydarzenia','Webinary, targi, eventy, spotkania.',`<button class="btn" onclick="openM('event')">+ Wydarzenie</button>`)+`<div class="grid c2">${q(s.events,['name','type','status']).map(x=>`<div class="card"><span class="chip">${x.type}</span><h2>${esc(x.name)}</h2><p>${x.date} · ${x.status}</p><button class="btn sm sec" onclick="useTemplate('${s.templates[0].id}')">Przypisz checklistę</button> ${act('events',x.id)}</div>`).join('')}</div>`}
function partners(){return T('Partnerzy','Bez klientów: wykonawcy, dostawcy, media, organizatorzy.',`<button class="btn" onclick="openM('partner')">+ Partner</button>`)+`<div class="card">${q(s.partners,['name','type','person','notes']).map(p=>item(p.name,`${p.type} · ${p.person} · ${p.email}`,act('partners',p.id))).join('')}</div>`}
function materials(){return T('Materiały i magazyn','Upload/download, Dropbox oraz magazyn Biuro/Garaż.',`<button class="btn" onclick="openM('warehouse')">+ Materiał</button>`)+`<div class="grid c2"><div class="card"><h2>Pliki</h2><div id="drop" class="drop">Przeciągnij pliki albo kliknij<input id="file" type="file" multiple hidden></div>${s.files.map(f=>item(f.name,`${Math.round(f.size/1024)} KB`,`<button class="btn sm sec" onclick="down('${f.id}')">Pobierz</button> ${act('files',f.id)}`)).join('')}</div><div class="card"><h2>Dropbox</h2>${s.dropbox.map(d=>item(d.name,d.cat,`<a class="btn sm sec" href="${esc(d.url)}" target="_blank">Otwórz</a> ${act('dropbox',d.id)}`)).join('')}<button class="btn sec" onclick="openM('dropbox')">+ Link</button></div></div><div class="grid c2" style="margin-top:14px"><div class="card"><h2>Biuro</h2>${s.warehouse.filter(w=>w.place==='Biuro').map(w=>item(w.name,`${w.cat} · min. ${w.min}`,`<span class="chip ${w.qty<=w.min?'warn':'ok'}">${w.qty} szt.</span> ${act('warehouse',w.id)}`)).join('')}</div><div class="card"><h2>Garaż</h2>${s.warehouse.filter(w=>w.place==='Garaż').map(w=>item(w.name,`${w.cat} · min. ${w.min}`,`<span class="chip ${w.qty<=w.min?'warn':'ok'}">${w.qty} szt.</span> ${act('warehouse',w.id)}`)).join('')}</div></div>`}
function finance(){return T('Finanse','Faktury, koszty, narzędzia płatne i subskrypcje.',`<button class="btn" onclick="openM('finance')">+ Koszt</button>`)+`<div class="grid c3"><div class="card"><h2>Do opłacenia</h2>${s.finance.filter(x=>x.status==='Do opłacenia').map(x=>item(x.name,`${x.type} · ${x.due}`,`<b>${x.amount} zł</b> ${act('finance',x.id)}`)).join('')}</div><div class="card"><h2>Subskrypcje</h2>${s.finance.filter(x=>x.status==='Subskrypcja').map(x=>item(x.name,`${x.type} · ${x.due}`,`<b>${x.amount} zł</b> ${act('finance',x.id)}`)).join('')}</div><div class="card"><h2>Narzędzia</h2>${s.finance.filter(x=>x.type.includes('Narzędzie')).map(x=>item(x.name,x.status,`<b>${x.amount} zł</b> ${act('finance',x.id)}`)).join('')}</div></div>`}
function checks(){return T('Checklisty','Szablony można przypisywać i modyfikować.',`<button class="btn" onclick="openM('template')">+ Szablon</button>`)+`<div class="grid c2"><div class="card"><h2>Szablony</h2>${s.templates.map(t=>item(t.name,t.items.length+' punktów',`<button class="btn sm sec" onclick="useTemplate('${t.id}')">Użyj</button> ${act('templates',t.id)}`)).join('')}</div><div class="card"><h2>Przypisane</h2>${s.assigned.map(c=>`<h3>${esc(c.name)} ${act('assigned',c.id)}</h3>${c.items.map((x,i)=>`<div class="item"><label><input type="checkbox" ${x.d?'checked':''} onchange="tog('${c.id}',${i})"> ${esc(x.t)}</label><button class="btn sm sec" onclick="taskFrom('${c.id}',${i})">Zadanie</button></div>`).join('')}`).join('')}</div></div>`}
function notes(){let ns=s.notes.filter(n=>n.vis==='shared'||n.owner===s.auth.id);return T('Notatki wizualne','Prywatne notatki widzi tylko właściciel konta.',`<button class="btn" onclick="openM('note')">+ Notatka</button>`)+`<div class="card"><div class="board">${ns.map(n=>`<div class="note ${n.c}" data-n="${n.id}" style="left:${n.x}px;top:${n.y}px"><b>${esc(n.title)}</b><p>${esc(n.body)}</p><small>${n.vis==='private'?'🔒 prywatna':'👥 wspólna'}</small><br>${act('notes',n.id)}</div>`).join('')}</div></div>`}
function reports(){return T('Raporty','Statystyki i eksport danych.')+`<div class="grid c4"><div class="card metric"><small>Zadania</small><br><b>${s.tasks.length}</b></div><div class="card metric"><small>Posty</small><br><b>${s.social.length}</b></div><div class="card metric"><small>Kreacje</small><br><b>${s.creative.length}</b></div><div class="card metric"><small>Magazyn</small><br><b>${s.warehouse.reduce((a,b)=>a+ +b.qty,0)}</b></div></div><div class="card" style="margin-top:14px"><button class="btn" onclick="exportData()">Eksport JSON</button></div>`}
function settings(){return T('Ustawienia','Zespół, motywy, integracje i dane.')+`<div class="grid c2"><div class="card"><h2>Zespół</h2>${s.users.map(u=>item(u.name,`${u.email} · ${u.role}`,u.id===ME?'<span class="chip">Ty</span>':act('users',u.id))).join('')}<button class="btn sec" onclick="openM('user')">+ Osoba</button><p class="hint">Marketing widzi wspólne dane. Prywatne notatki są tylko dla właściciela.</p></div><div class="card"><h2>Wygląd</h2><div class="grid c2">${['ocean','rose','forest','violet'].map(t=>`<button class="sw ${t}" onclick="theme('${t}')"></button>`).join('')}</div><br><button class="btn sec" onclick="mode()">Jasny/ciemny</button></div><div class="card"><h2>Integracje</h2>${['Dropbox','Google Calendar','Outlook','Bitrix/CRM','Meta Ads','Google Ads','Slack/Teams','SMTP','Księgowość'].map(x=>item(x,'do podłączenia przez backend/API','<span class="chip warn">mock</span>')).join('')}</div><div class="card"><h2>Dane</h2><button class="btn sec" onclick="exportData()">Eksport</button> <button class="btn del" onclick="reset()">Reset</button></div></div>`}
function modal(){return `<div id="mo" class="modal"><div class="box"><div style="display:flex;justify-content:space-between"><h2 id="mt">Dodaj</h2><button class="btn sec" onclick="closeM()">✕</button></div><div id="mb"></div></div></div>`}function openM(k){mo.classList.add('on');mt.textContent='Dodaj: '+k;let f={task:['title:Nazwa','due:Termin','prio:Priorytet','panel:Panel'],project:['name:Nazwa','type:Typ','status:Status','due:Deadline','budget:Budżet','desc:Opis'],event:['name:Nazwa','type:Typ','date:Data','status:Status'],partner:['name:Nazwa','type:Typ','person:Osoba','email:E-mail','phone:Telefon','notes:Notatki'],social:['title:Tytuł','channel:Kanał','status:Status','date:Data'],creative:['name:Nazwa','format:Format','status:Status','due:Deadline'],warehouse:['name:Nazwa','place:Biuro/Garaż','qty:Ilość','min:Minimum','cat:Kategoria'],finance:['name:Nazwa','amount:Kwota','status:Status','due:Termin','type:Typ'],dropbox:['name:Nazwa','url:Link','cat:Kategoria'],user:['name:Imię','email:E-mail','role:Rola']};if(k==='note')return mb.innerHTML=`<input id="f_title" class="inp" placeholder="Tytuł"><br><br><textarea id="f_body" class="inp" placeholder="Treść"></textarea><br><br><select id="f_vis" class="inp"><option value="private">Prywatna</option><option value="shared">Wspólna</option></select><br><br><button class="btn" onclick="add('note')">Zapisz</button>`;if(k==='template')return mb.innerHTML=`<input id="f_name" class="inp" placeholder="Nazwa"><br><br><textarea id="f_items" class="inp" placeholder="Punkty, każdy w nowej linii"></textarea><br><br><button class="btn" onclick="add('template')">Zapisz</button>`;mb.innerHTML=`<div class="fg">${(f[k]||f.task).map(x=>{let a=x.split(':');return `<label><small>${a[1]}</small><input class="inp" id="f_${a[0]}"></label>`}).join('')}<button class="btn full" onclick="add('${k}')">Zapisz</button></div>`}function closeM(){mo.classList.remove('on')}function val(x){return document.getElementById('f_'+x)?.value||''}
function add(k){if(k==='task')s.tasks.push({id:uid(),title:val('title'),due:val('due')||today(),prio:val('prio')||'Normalny',status:'Do zrobienia',panel:val('panel')||s.panel});if(k==='project')s.projects.push({id:uid(),name:val('name'),type:val('type')||'projekt',status:val('status')||'Planowanie',due:val('due')||today(),budget:+val('budget')||0,desc:val('desc')});if(k==='event')s.events.push({id:uid(),name:val('name'),type:val('type')||'Event',date:val('date')||today(),status:val('status')||'Plan'});if(k==='partner')s.partners.push({id:uid(),name:val('name'),type:val('type')||'Dostawca',person:val('person'),email:val('email'),phone:val('phone'),notes:val('notes')});if(k==='social')s.social.push({id:uid(),title:val('title'),channel:val('channel')||'LinkedIn',status:val('status')||'Draft',date:val('date')||today()});if(k==='creative')s.creative.push({id:uid(),name:val('name'),format:val('format'),status:val('status')||'Brief',due:val('due')||today()});if(k==='warehouse')s.warehouse.push({id:uid(),name:val('name'),place:val('place')==='Garaż'?'Garaż':'Biuro',qty:+val('qty')||0,min:+val('min')||0,cat:val('cat')});if(k==='finance')s.finance.push({id:uid(),name:val('name'),amount:+val('amount')||0,status:val('status')||'Do opłacenia',due:val('due')||today(),type:val('type')||'Koszt'});if(k==='dropbox')s.dropbox.push({id:uid(),name:val('name'),url:val('url'),cat:val('cat')});if(k==='user')s.users.push({id:uid(),name:val('name'),email:val('email'),role:val('role')||'Marketing'});if(k==='template')s.templates.push({id:uid(),name:val('name'),items:val('items').split('\n').filter(Boolean)});if(k==='note')s.notes.push({id:uid(),owner:ME,vis:val('vis'),title:val('title'),body:val('body'),x:80+Math.random()*260,y:70+Math.random()*230,c:'pink'});save();closeM();r()}function del(col,id){if(col==='users'&&id===ME)return alert('Nie możesz usunąć własnego konta.');let n=s.notes.find(x=>x.id===id);if(col==='notes'&&n&&n.vis==='private'&&n.owner!==ME)return alert('To prywatna notatka innej osoby.');if(confirm('Usunąć element?')){s[col]=s[col].filter(x=>x.id!==id);save();r()}}
function bind(){document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{s.view=b.dataset.v;save();r()});document.querySelectorAll('[data-panel]').forEach(b=>b.onclick=()=>{s.panel=b.dataset.panel;save();r()});let l=document.getElementById('log');if(l)l.onclick=()=>{let em=email.value.trim();if(!em.endsWith('@felg.app'))return err.textContent='Dostęp tylko dla @felg.app';s.auth={id:ME,email:em,name:'Gosia'};save();r()};let o=document.getElementById('out');if(o)o.onclick=()=>{s.auth=null;save();r()};let qq=document.getElementById('q');if(qq)qq.oninput=e=>{s.q=e.target.value;save();r()};dropBind();noteBind()}function dragT(e,id){e.dataTransfer.setData('id',id)}function dropT(e,st){let t=s.tasks.find(x=>x.id===e.dataTransfer.getData('id'));if(t){t.status=st;save();r()}}function dropBind(){let d=document.getElementById('drop'),f=document.getElementById('file');if(!d)return;d.onclick=()=>f.click();d.ondragover=e=>e.preventDefault();d.ondrop=e=>{e.preventDefault();files(e.dataTransfer.files)};f.onchange=e=>files(e.target.files)}function files(fs){[...fs].forEach(file=>{let rd=new FileReader();rd.onload=()=>{s.files.push({id:uid(),name:file.name,size:file.size,data:rd.result});save();r()};rd.readAsDataURL(file)})}function down(id){let f=s.files.find(x=>x.id===id);if(!f)return;let a=document.createElement('a');a.href=f.data;a.download=f.name;a.click()}function utm(){let u=document.getElementById('u').value||'https://felg.app',src=document.getElementById('src').value||'social',camp=document.getElementById('camp').value||'kampania';uo.textContent=u+(u.includes('?')?'&':'?')+'utm_source='+src+'&utm_medium=social&utm_campaign='+camp}function useTemplate(id){let t=s.templates.find(x=>x.id===id);s.assigned.push({id:uid(),name:t.name+' — kopia',items:t.items.map(t=>({t,d:false}))});save();r()}function tog(id,i){let c=s.assigned.find(x=>x.id===id);c.items[i].d=!c.items[i].d;save();r()}function taskFrom(id,i){let c=s.assigned.find(x=>x.id===id);s.tasks.push({id:uid(),title:c.items[i].t,status:'Do zrobienia',prio:'Normalny',due:today(),panel:'Ogólny'});save();r()}function theme(t){s.theme=t;save();r()}function mode(){s.mode=s.mode==='dark'?'light':'dark';save();r()}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(s,null,2)],{type:'application/json'}));a.download='marketing-hub.json';a.click()}function reset(){if(confirm('Reset danych?')){localStorage.removeItem(KEY);s=structuredClone(seed);r()}}function noteBind(){document.querySelectorAll('.note').forEach(el=>{let ox,oy,id=el.dataset.n;el.onpointerdown=e=>{el.setPointerCapture(e.pointerId);ox=e.clientX-el.offsetLeft;oy=e.clientY-el.offsetTop};el.onpointermove=e=>{if(!el.hasPointerCapture(e.pointerId))return;el.style.left=e.clientX-ox+'px';el.style.top=e.clientY-oy+'px'};el.onpointerup=e=>{let n=s.notes.find(x=>x.id===id);n.x=parseInt(el.style.left);n.y=parseInt(el.style.top);save();try{el.releasePointerCapture(e.pointerId)}catch(_){}}})}
r();
</script></body></html>
