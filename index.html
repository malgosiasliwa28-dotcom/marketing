<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Marketing Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#111827;--mut:#64748b;--line:#e5e7eb;--a:#2563eb;--b:#7c3aed}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial;background:radial-gradient(circle at 10% 10%,#60a5fa55,transparent 28%),radial-gradient(circle at 90% 0,#a78bfa55,transparent 28%),var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.btn{border:0;border-radius:14px;padding:10px 14px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff;font-weight:800;cursor:pointer}.btn.sec{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.del{background:linear-gradient(135deg,#ef4444,#f97316)}.inp{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;color:var(--text)}.hint{color:var(--mut);font-size:13px}.login{min-height:100vh;display:grid;place-items:center;padding:22px}.box{width:min(960px,100%);display:grid;grid-template-columns:1fr 1fr;border-radius:28px;overflow:hidden;background:#ffffffdd;border:1px solid #fff;box-shadow:0 25px 80px #0f172a25}.hero{padding:44px;background:linear-gradient(135deg,var(--a),var(--b));color:#fff}.hero h1{font-size:42px;line-height:1;margin:20px 0}.form{padding:40px;display:flex;flex-direction:column;gap:12px}.tabs{display:flex;gap:8px}.tabs button{flex:1}.tabs .on{background:#111827;color:#fff}.msg{padding:10px;border-radius:14px;background:#dbeafe;color:#1e40af}.err{padding:10px;border-radius:14px;background:#fee2e2;color:#991b1b}.app{height:100vh;display:grid;grid-template-columns:280px 1fr}.side{background:#ffffffcc;border-right:1px solid var(--line);padding:18px;overflow:auto}.brand{font-weight:900;font-size:20px;margin-bottom:18px}.nav{display:flex;flex-direction:column;gap:7px}.nav button{text-align:left;border:0;background:transparent;border-radius:14px;padding:11px;color:var(--mut);font-weight:800;cursor:pointer}.nav button.on,.nav button:hover{background:#2563eb18;color:var(--text)}.main{padding:22px;overflow:auto}.top{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:18px}.grid{display:grid;gap:14px}.c4{grid-template-columns:repeat(4,1fr)}.c2{grid-template-columns:repeat(2,1fr)}.card{background:#ffffffdd;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 14px 40px #0f172a10}.metric b{font-size:32px}.item{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0;background:#fff}.item h4{margin:0}.item p{margin:3px 0 0;color:var(--mut);font-size:13px}.drop{border:2px dashed var(--a);border-radius:18px;padding:20px;text-align:center;background:#2563eb12;cursor:pointer}@media(max-width:800px){.box,.app,.c4,.c2{grid-template-columns:1fr}.app{height:auto}.side{border-right:0;border-bottom:1px solid var(--line)}body{overflow:auto}}
</style>
</head>
<body>
<div id="root"></div>
<script>
var root=document.getElementById('root');
var cfg={supabaseUrl:'',supabaseAnonKey:'',allowedDomain:'felg.app'};
try{cfg=Object.assign(cfg,JSON.parse(localStorage.getItem('mh-config')||'{}'))}catch(e){localStorage.removeItem('mh-config')}
var sb=(cfg.supabaseUrl&&cfg.supabaseAnonKey&&window.supabase)?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;
var state={user:null,mode:'login',view:'dashboard',items:[],msg:'',loading:false};
var views=['dashboard','zadania','projekty','social','kreacje','wydarzenia','partnerzy','magazyn','finanse','checklisty','notatki','ustawienia'];
function esc(x){return String(x==null?'':x).replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]})}
function show(m,bad){state.msg=(bad?'Błąd: ':'')+m;render()}
function byType(t){return state.items.filter(function(x){return x.type===t}).map(function(x){var d=x.data||{};d.id=x.id;d.visibility=x.visibility;return d})}
function raw(id){return state.items.find(function(x){return x.id===id})}
function render(){try{if(!sb)return renderConfig();if(!state.user)return renderAuth();return renderApp()}catch(e){root.innerHTML='<div class="login"><div class="card"><h1>Błąd aplikacji</h1><div class="err">'+esc(e.message)+'</div><p>Wyślij ten komunikat albo wyczyść konfigurację.</p><button class="btn" id="clear">Wyczyść konfigurację</button></div></div>';document.getElementById('clear').onclick=function(){localStorage.removeItem('mh-config');location.reload()}}}
function renderConfig(){root.innerHTML='<div class="login"><div class="box"><div class="hero"><h1>Marketing Hub</h1><p>Podłącz Supabase, żeby dane były wspólne dla marketingu.</p></div><div class="form"><h2>Konfiguracja Supabase</h2><input class="inp" id="url" placeholder="SUPABASE_URL"><input class="inp" id="key" placeholder="SUPABASE_ANON_KEY / publishable key"><input class="inp" id="domain" value="'+esc(cfg.allowedDomain)+'" placeholder="domena bez @"><button class="btn" id="save">Zapisz konfigurację</button><p class="hint">Domena: np. felg.app, bez małpy.</p></div></div></div>';document.getElementById('save').onclick=function(){localStorage.setItem('mh-config',JSON.stringify({supabaseUrl:document.getElementById('url').value.trim(),supabaseAnonKey:document.getElementById('key').value.trim(),allowedDomain:document.getElementById('domain').value.trim()||'felg.app'}));location.reload()}}
function renderAuth(){var title=state.mode==='login'?'Zaloguj hasłem':state.mode==='signup'?'Utwórz konto':'Reset hasła';root.innerHTML='<div class="login"><div class="box"><div class="hero"><h1>Marketing Hub</h1><p>Logowanie hasłem, tworzenie konta z potwierdzeniem maila i reset hasła.</p><p>Dostęp tylko dla @'+esc(cfg.allowedDomain)+'</p></div><div class="form"><div class="tabs"><button class="btn sec '+(state.mode==='login'?'on':'')+'" data-mode="login">Zaloguj</button><button class="btn sec '+(state.mode==='signup'?'on':'')+'" data-mode="signup">Utwórz konto</button><button class="btn sec '+(state.mode==='reset'?'on':'')+'" data-mode="reset">Reset</button></div><h2>'+title+'</h2>'+(state.msg?'<div class="msg">'+esc(state.msg)+'</div>':'')+'<input class="inp" id="email" value="malgorzata.sliwa@felg.app" placeholder="e-mail">'+(state.mode!=='reset'?'<input class="inp" id="pass" type="password" placeholder="hasło">':'')+(state.mode==='signup'?'<input class="inp" id="name" placeholder="imię i nazwisko">':'')+'<button class="btn" id="auth">'+title+'</button><p class="hint">Jeśli ustawiłaś hasło ręcznie w Supabase, użyj zakładki Zaloguj.</p></div></div></div>';document.querySelectorAll('[data-mode]').forEach(function(b){b.onclick=function(){state.mode=b.dataset.mode;state.msg='';render()}});document.getElementById('auth').onclick=authAction}
async function authAction(){var email=document.getElementById('email').value.trim();var pass=(document.getElementById('pass')||{}).value||'';if(!email.toLowerCase().endsWith('@'+cfg.allowedDomain.toLowerCase()))return show('Dostęp tylko dla @'+cfg.allowedDomain,true);show('Sprawdzam...');try{if(state.mode==='login'){var r=await sb.auth.signInWithPassword({email:email,password:pass});if(r.error)throw r.error;state.user=r.data.user;await loadAll();return}if(state.mode==='signup'){if(pass.length<6)return show('Hasło musi mieć minimum 6 znaków',true);var name=(document.getElementById('name')||{}).value||email.split('@')[0];var s=await sb.auth.signUp({email:email,password:pass,options:{emailRedirectTo:location.origin+location.pathname,data:{full_name:name}}});if(s.error)throw s.error;return show('Konto utworzone. Potwierdź mail i zaloguj się hasłem.')}if(state.mode==='reset'){var rr=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});if(rr.error)throw rr.error;return show('Wysłano link resetu hasła.')}}catch(e){show(e.message,true)}}
async function init(){if(!sb)return render();var r=await sb.auth.getSession();state.user=r.data.session?r.data.session.user:null;sb.auth.onAuthStateChange(async function(ev,session){state.user=session?session.user:null;if(ev==='PASSWORD_RECOVERY'){var np=prompt('Wpisz nowe hasło');if(np){var u=await sb.auth.updateUser({password:np});alert(u.error?u.error.message:'Hasło zmienione')}}if(state.user)await loadAll();else render()});if(state.user)await loadAll();else render()}
async function loadAll(){state.loading=true;renderApp();var r=await sb.from('marketing_items').select('*').order('created_at',{ascending:false});if(r.error){alert(r.error.message);state.items=[]}else state.items=r.data||[];state.loading=false;renderApp()}
function nav(){return views.map(function(v){return '<button class="'+(state.view===v?'on':'')+'" data-view="'+v+'">'+label(v)+'</button>'}).join('')}
function label(v){return {dashboard:'🏠 Dashboard',zadania:'✅ Zadania',projekty:'📁 Projekty',social:'📱 Social Media',kreacje:'🎨 Kreacje',wydarzenia:'🎤 Wydarzenia',partnerzy:'🤝 Partnerzy',magazyn:'📦 Magazyn i pliki',finanse:'💳 Finanse',checklisty:'☑️ Checklisty',notatki:'📝 Notatki',ustawienia:'⚙️ Ustawienia'}[v]||v}
function renderApp(){root.innerHTML='<div class="app"><aside class="side"><div class="brand">Marketing Hub</div><div class="card"><b>'+esc(state.user?state.user.email:'')+'</b><p class="hint">zalogowano</p></div><br><nav class="nav">'+nav()+'</nav></aside><main class="main"><div class="top"><h1>'+label(state.view)+'</h1><div><button class="btn sec" id="refresh">Odśwież</button> <button class="btn sec" id="logout">Wyloguj</button></div></div>'+(state.loading?'<div class="msg">Ładowanie...</div>':'')+screen()+'</main></div>';document.querySelectorAll('[data-view]').forEach(function(b){b.onclick=function(){state.view=b.dataset.view;renderApp()}});document.getElementById('logout').onclick=function(){sb.auth.signOut()};document.getElementById('refresh').onclick=loadAll;bindScreen()}
function screen(){if(state.view==='dashboard')return dashboard();if(state.view==='magazyn')return magazyn();if(state.view==='notatki')return list('note','Notatka','title','body');if(state.view==='checklisty')return list('template','Checklista','name','items');if(state.view==='ustawienia')return settings();var map={zadania:['task','Zadanie','title','status'],projekty:['project','Projekt','name','status'],social:['social','Post','title','channel'],kreacje:['creative','Kreacja','name','status'],wydarzenia:['event','Wydarzenie','name','date'],partnerzy:['partner','Partner','name','type'],finanse:['finance','Koszt','name','amount']};var m=map[state.view]||map.zadania;return list(m[0],m[1],m[2],m[3])}
function dashboard(){return '<div class="grid c4"><div class="card metric"><small>Zadania</small><br><b>'+byType('task').length+'</b></div><div class="card metric"><small>Projekty</small><br><b>'+byType('project').length+'</b></div><div class="card metric"><small>Wydarzenia</small><br><b>'+byType('event').length+'</b></div><div class="card metric"><small>Partnerzy</small><br><b>'+byType('partner').length+'</b></div></div><div class="card" style="margin-top:14px"><h2>Szybkie akcje</h2><button class="btn" data-add="task">+ Zadanie</button> <button class="btn sec" id="seed">Dodaj dane startowe</button></div>'}
function list(t,label,a,b){var arr=byType(t);return '<div class="card"><button class="btn" data-add="'+t+'">+ Dodaj '+label+'</button></div><div class="grid c2" style="margin-top:14px">'+(arr.map(function(x){var sub=Array.isArray(x[b])?x[b].join(', '):x[b];return '<div class="card"><h2>'+esc(x[a]||x.name||x.title||'(bez nazwy)')+'</h2><p class="hint">'+esc(sub||'')+'</p><button class="btn del" data-del="'+x.id+'">Usuń</button></div>'}).join('')||'<div class="card">Brak danych.</div>')+'</div>'}
function magazyn(){return '<div class="grid c2"><div class="card"><h2>Magazyn</h2><button class="btn" data-add="warehouse">+ Dodaj rzecz</button>'+byType('warehouse').map(function(x){return '<div class="item"><div><h4>'+esc(x.name)+'</h4><p>'+esc(x.place||'Biuro')+' · '+esc(x.qty||0)+' szt.</p></div><button class="btn sm del" data-del="'+x.id+'">Usuń</button></div>'}).join('')+'</div><div class="card"><h2>Pliki</h2><div class="drop" id="drop">Kliknij, aby wgrać pliki<input id="file" type="file" multiple hidden></div>'+byType('file').map(function(f){return '<div class="item"><div><h4>'+esc(f.name)+'</h4><p>'+Math.round((f.size||0)/1024)+' KB</p></div><button class="btn sm sec" data-down="'+f.id+'">Pobierz</button></div>'}).join('')+'</div></div>'}
function settings(){return '<div class="card"><h2>Ustawienia</h2><p>Supabase: '+esc(cfg.supabaseUrl)+'</p><button class="btn sec" id="clearCfg">Zmień konfigurację</button></div>'}
function bindScreen(){document.querySelectorAll('[data-add]').forEach(function(b){b.onclick=function(){addItem(b.dataset.add)}});document.querySelectorAll('[data-del]').forEach(function(b){b.onclick=function(){removeItem(b.dataset.del)}});document.querySelectorAll('[data-down]').forEach(function(b){b.onclick=function(){downloadFile(b.dataset.down)}});var seed=document.getElementById('seed');if(seed)seed.onclick=seedDemo;var clear=document.getElementById('clearCfg');if(clear)clear.onclick=function(){localStorage.removeItem('mh-config');location.reload()};var drop=document.getElementById('drop'),file=document.getElementById('file');if(drop&&file){drop.onclick=function(){file.click()};file.onchange=function(){uploadFiles(file.files)}}}
async function addItem(t){var name=prompt('Nazwa');if(!name)return;var extra=prompt('Status / typ / ilość / opis','');var data={name:name,title:name,status:extra,type:extra,date:extra,channel:extra,amount:Number(extra)||0,qty:Number(extra)||0,place:extra==='Garaż'?'Garaż':'Biuro',body:extra,items:extra?[extra]:[]};var vis=t==='note'?'private':'team';var r=await sb.from('marketing_items').insert({type:t,data:data,visibility:vis,owner_id:state.user.id});if(r.error)alert(r.error.message);await loadAll()}
async function removeItem(id){if(!confirm('Usunąć?'))return;var r=raw(id);if(r&&r.type==='file'&&r.data.path)await sb.storage.from('marketing-files').remove([r.data.path]);var d=await sb.from('marketing_items').delete().eq('id',id);if(d.error)alert(d.error.message);await loadAll()}
async function seedDemo(){var rows=[{type:'task',data:{title:'Przygotować mailing',status:'Do zrobienia'},visibility:'team',owner_id:state.user.id},{type:'project',data:{name:'Kampania webinarowa',status:'W trakcie'},visibility:'team',owner_id:state.user.id},{type:'event',data:{name:'Webinar',date:'2026-07-10'},visibility:'team',owner_id:state.user.id},{type:'template',data:{name:'Webinar',items:['Landing','Mailing','Grafiki','Prezentacja','Nagranie']},visibility:'team',owner_id:state.user.id}];var r=await sb.from('marketing_items').insert(rows);if(r.error)alert(r.error.message);await loadAll()}
async function uploadFiles(files){for(var i=0;i<files.length;i++){var f=files[i],path=state.user.id+'/'+Date.now()+'-'+f.name;var up=await sb.storage.from('marketing-files').upload(path,f);if(up.error){alert(up.error.message);continue}await sb.from('marketing_items').insert({type:'file',data:{name:f.name,size:f.size,path:path},visibility:'team',owner_id:state.user.id})}await loadAll()}
async function downloadFile(id){var r=raw(id);var s=await sb.storage.from('marketing-files').createSignedUrl(r.data.path,60);if(s.error)return alert(s.error.message);window.open(s.data.signedUrl,'_blank')}
window.addEventListener('error',function(e){root.innerHTML='<div class="login"><div class="card"><h1>Błąd aplikacji</h1><div class="err">'+esc(e.message)+'</div><button class="btn" onclick="location.reload()">Odśwież</button></div></div>'});
init();
</script>
</body>
</html>
