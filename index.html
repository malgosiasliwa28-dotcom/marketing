<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketing Hub</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--bg:#f6f7fb;--p:#fff;--t:#111827;--m:#64748b;--l:#e5e7eb;--a:#2563eb;--b:#7c3aed}*{box-sizing:border-box}body{margin:0;font-family:Arial,system-ui;background:radial-gradient(circle at 5% 0,#60a5fa55,transparent 26%),radial-gradient(circle at 95% 0,#a78bfa55,transparent 26%),var(--bg);color:var(--t)}button,input,select,textarea{font:inherit}.btn{border:0;border-radius:12px;padding:10px 14px;background:linear-gradient(135deg,var(--a),var(--b));color:white;font-weight:800;cursor:pointer}.sec{background:white;color:var(--t);border:1px solid var(--l)}.danger{background:#ef4444}.small{font-size:12px;padding:7px 9px}.inp{width:100%;border:1px solid var(--l);border-radius:12px;padding:10px;background:white}.area{min-height:88px}.hint{color:var(--m);font-size:13px}.login{min-height:100vh;display:grid;place-items:center;padding:20px}.loginbox{width:min(980px,100%);display:grid;grid-template-columns:1fr 1fr;background:#ffffffdd;border:1px solid var(--l);border-radius:28px;overflow:hidden;box-shadow:0 24px 70px #0f172a22}.hero{padding:42px;background:linear-gradient(135deg,var(--a),var(--b));color:white}.hero h1{font-size:46px;line-height:1;margin:16px 0}.form{padding:36px;display:flex;flex-direction:column;gap:10px}.tabs{display:flex;gap:8px}.tabs button{flex:1}.tabs .on{background:#111827;color:white}.msg{padding:10px;border-radius:12px;background:#dbeafe;color:#1e40af;white-space:pre-wrap}.err{background:#fee2e2;color:#991b1b}.app{height:100vh;display:grid;grid-template-columns:285px 1fr;overflow:hidden}.side{background:#ffffffcc;border-right:1px solid var(--l);padding:18px;overflow:auto}.brand{font-size:21px;font-weight:950;margin-bottom:14px}.user{background:white;border:1px solid var(--l);border-radius:16px;padding:12px;margin-bottom:12px}.nav button{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--m);font-weight:800;border-radius:12px;padding:10px;margin:3px 0}.nav button.on,.nav button:hover{background:#dbeafe;color:#111827}.main{height:100vh;overflow:auto;padding:20px 24px 50px}.top{position:sticky;top:0;background:linear-gradient(to bottom,var(--bg) 80%,transparent);z-index:5;display:grid;grid-template-columns:1fr auto auto auto;gap:10px;padding-bottom:15px}.title{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin:8px 0 18px}.title h1{margin:0;font-size:34px}.grid{display:grid;gap:14px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.card{background:#ffffffdd;border:1px solid var(--l);border-radius:20px;padding:16px;box-shadow:0 14px 36px #0f172a10}.metric b{font-size:32px}.item{border:1px solid var(--l);background:white;border-radius:16px;padding:13px;margin:8px 0}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.item h3,.item h4{margin:0 0 5px}.tag{display:inline-block;border-radius:99px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:800;padding:4px 8px;margin:2px}.modal{position:fixed;inset:0;background:#0f172a99;display:none;place-items:center;padding:20px;z-index:50}.modal.on{display:grid}.box{width:min(900px,100%);max-height:92vh;overflow:auto;background:white;border-radius:24px;padding:22px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.caltools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.caltools .on{background:#111827;color:white}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.weekday{font-weight:900;color:#64748b;text-align:center}.day{min-height:126px;background:white;border:1px solid var(--l);border-radius:14px;padding:8px;overflow:hidden}.emptyday{background:#f8fafc99}.today{border:2px solid var(--a);box-shadow:0 0 0 4px #2563eb22}.daynum{font-weight:900;display:flex;justify-content:space-between}.ev{font-size:11px;background:#dbeafe;border-radius:8px;padding:5px;margin-top:5px;cursor:pointer}.ev.social{background:#fee2e2}.ev.event{background:#dcfce7}.ev.deadline{background:#fef3c7}.ev.campaign{background:#ede9fe}.ev.webinar{background:#e0f2fe}.drop{border:2px dashed var(--a);border-radius:16px;padding:18px;text-align:center;background:#dbeafe}.note{background:#fef3c7;color:#3f2f00}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:white;padding:12px 14px;border-radius:14px;font-weight:800;z-index:80}@media(max-width:900px){.app,.loginbox,.g4,.g3,.g2,.fg,.cal{grid-template-columns:1fr}.app{height:auto}.side{border-right:0;border-bottom:1px solid var(--l)}.main{height:auto}.top{grid-template-columns:1fr}.weekday{display:none}}</style></head><body><div id="root"></div><div id="modal" class="modal"></div><script>
const root=document.getElementById('root'), modal=document.getElementById('modal');
let cfg={supabaseUrl:'',supabaseAnonKey:'',allowedDomain:'felg.app'};try{cfg={...cfg,...JSON.parse(localStorage.getItem('mh-config')||'{}')}}catch(e){}
let sb=cfg.supabaseUrl&&cfg.supabaseAnonKey&&window.supabase?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;
let now=new Date();let S={user:null,items:[],view:'dashboard',mode:'login',q:'',msg:'',custom:[],calYear:now.getFullYear(),calMonth:now.getMonth(),calFilter:'all'};
const MODULES={dashboard:['🏠','Dashboard'],calendar:['📅','Kalendarz'],tasks:['✅','Zadania'],projects:['📁','Projekty i kampanie'],events:['🎤','Wydarzenia'],social:['📱','Social Media'],creative:['🎨','Kreacje'],partners:['🤝','Partnerzy'],files:['🗂️','Pliki'],warehouse:['📦','Magazyn'],finance:['💳','Finanse'],checks:['☑️','Checklisty'],notes:['📝','Notatki'],custom:['➕','Własne zakładki'],settings:['⚙️','Ustawienia']};
const TYPES={tasks:'task',projects:'project',events:'event',social:'social',creative:'creative',partners:'partner',files:'file',warehouse:'warehouse',finance:'finance',checks:'template',notes:'note'};
const fields={task:[['title','Nazwa zadania'],['status','Status','select','Do zrobienia|W trakcie|Do sprawdzenia|Gotowe'],['priority','Priorytet','select','Niski|Normalny|Wysoki|Pilne'],['due','Termin','date'],['owner','Odpowiedzialny'],['project','Projekt/kampania'],['description','Opis','textarea']],project:[['name','Nazwa'],['kind','Typ','select','Projekt|Kampania'],['status','Status','select','Pomysł|Planowanie|W trakcie|Do akceptu|Zakończone'],['goal','Cel'],['budget','Budżet','number'],['due','Deadline','date'],['owner','Odpowiedzialny'],['description','Opis szczegółowy','textarea']],event:[['name','Nazwa'],['kind','Typ','select','Webinar|Targi|Event|Spotkanie|Deadline|Inne'],['date','Data','date'],['time','Godzina'],['status','Status','select','Plan|W przygotowaniu|Gotowe|Po wydarzeniu|Anulowane'],['host','Prowadzący/organizator'],['place','Miejsce/link'],['budget','Koszt','number'],['project','Powiązany projekt'],['description','Opis','textarea']],social:[['title','Tytuł posta'],['channel','Kanał','select','LinkedIn|Facebook|Instagram|TikTok|YouTube|Newsletter'],['date','Data publikacji','date'],['status','Status','select','Pomysł|Draft|Do akceptu|Zaplanowane|Opublikowane'],['copy','Treść posta','textarea'],['graphic','Grafika/format'],['campaign','Kampania']],creative:[['name','Nazwa kreacji'],['format','Format'],['status','Status','select','Brief|W trakcie|Do akceptu|Poprawki|Gotowe'],['due','Deadline','date'],['owner','Grafik/osoba'],['brief','Brief','textarea'],['deliverables','Materiały do przygotowania','textarea']],partner:[['name','Nazwa firmy/osoby'],['kind','Typ','select','Wykonawca|Dostawca|Media|Organizator|Partner biznesowy|Inne'],['person','Osoba kontaktowa'],['email','E-mail'],['phone','Telefon'],['www','Strona WWW'],['history','Historia współpracy','textarea'],['notes','Notatki','textarea']],warehouse:[['name','Nazwa materiału'],['place','Miejsce','select','Biuro|Garaż'],['qty','Ilość','number'],['min','Minimum','number'],['category','Kategoria'],['location','Dokładna lokalizacja'],['notes','Opis/notatki','textarea']],finance:[['name','Nazwa kosztu/faktury/narzędzia'],['kind','Typ','select','Faktura|Koszt kampanii|Subskrypcja|Narzędzie płatne|Zamówienie'],['amount','Kwota','number'],['status','Status','select','Do opłacenia|Opłacone|Subskrypcja|Wstrzymane'],['due','Termin płatności','date'],['supplier','Dostawca'],['project','Powiązany projekt'],['notes','Opis','textarea']],template:[['name','Nazwa checklisty'],['items','Punkty checklisty - każdy w nowej linii','textarea'],['category','Kategoria']],note:[['title','Tytuł'],['body','Treść','textarea'],['visibility','Widoczność','select','private|team']],custom:[['name','Nazwa'],['tab','Zakładka'],['status','Status'],['date','Termin','date'],['description','Opis','textarea']]};
function esc(x){return String(x??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))} function toast(t){let d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),4500)}
function type(t){return S.items.filter(i=>i.type===t).map(i=>({id:i.id,visibility:i.visibility,owner_id:i.owner_id,...(i.data||{})}))} function raw(id){return S.items.find(i=>i.id===id)}
function filtered(arr){let q=S.q.toLowerCase();return !q?arr:arr.filter(x=>JSON.stringify(x).toLowerCase().includes(q))}
async function init(){if(!sb)return renderConfig();let {data}=await sb.auth.getSession();S.user=data.session?.user||null;sb.auth.onAuthStateChange((ev,session)=>{S.user=session?.user||null;if(S.user)load();else renderAuth()});S.user?await load():renderAuth()}
async function load(){let r=await sb.from('marketing_items').select('*').order('created_at',{ascending:false});if(r.error){toast(r.error.message);S.items=[]}else S.items=r.data||[];S.custom=type('custom_tab');renderApp()}
function renderConfig(){root.innerHTML=`<div class="login"><div class="loginbox"><div class="hero"><h1>Marketing Hub</h1><p>Jedno centrum pracy marketingu z Supabase.</p></div><div class="form"><h2>Konfiguracja</h2><input id="u" class="inp" placeholder="SUPABASE_URL"><input id="k" class="inp" placeholder="SUPABASE_ANON_KEY / publishable key"><input id="d" class="inp" value="${esc(cfg.allowedDomain)}" placeholder="domena bez @"><button class="btn" id="save">Zapisz</button></div></div></div>`;document.getElementById('save').onclick=()=>{localStorage.setItem('mh-config',JSON.stringify({supabaseUrl:u.value.trim(),supabaseAnonKey:k.value.trim(),allowedDomain:d.value.trim()||'felg.app'}));location.reload()}}
function renderAuth(){let title=S.mode==='login'?'Zaloguj hasłem':S.mode==='signup'?'Utwórz konto':'Reset hasła';root.innerHTML=`<div class="login"><div class="loginbox"><div class="hero"><h1>Marketing Hub</h1><p>Logowanie, rejestracja z potwierdzeniem maila i reset hasła.</p><p>Dostęp tylko @${esc(cfg.allowedDomain)}</p></div><div class="form"><div class="tabs"><button class="btn sec ${S.mode==='login'?'on':''}" onclick="S.mode='login';renderAuth()">Zaloguj</button><button class="btn sec ${S.mode==='signup'?'on':''}" onclick="S.mode='signup';renderAuth()">Utwórz</button><button class="btn sec ${S.mode==='reset'?'on':''}" onclick="S.mode='reset';renderAuth()">Reset</button></div><h2>${title}</h2>${S.msg?`<div class="msg">${esc(S.msg)}</div>`:''}<input id="email" class="inp" value="malgorzata.sliwa@felg.app"><input id="pass" class="inp" type="password" placeholder="hasło" style="${S.mode==='reset'?'display:none':''}">${S.mode==='signup'?'<input id="name" class="inp" placeholder="imię i nazwisko">':''}<button id="auth" class="btn">${title}</button></div></div></div>`;document.getElementById('auth').onclick=auth}
async function auth(){let email=document.getElementById('email').value.trim(), pass=document.getElementById('pass').value;if(!email.endsWith('@'+cfg.allowedDomain)){S.msg='Dostęp tylko dla @'+cfg.allowedDomain;return renderAuth()}try{if(S.mode==='login'){let r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error;S.user=r.data.user;await load()}if(S.mode==='signup'){let r=await sb.auth.signUp({email,password:pass,options:{emailRedirectTo:location.origin,data:{full_name:document.getElementById('name')?.value||email}}});if(r.error)throw r.error;S.msg='Konto utworzone. Potwierdź mail i zaloguj się hasłem.';renderAuth()}if(S.mode==='reset'){let r=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin});if(r.error)throw r.error;S.msg='Wysłano link resetu hasła.';renderAuth()}}catch(e){S.msg=e.message;renderAuth()}}
function renderApp(){let nav=Object.keys(MODULES).map(k=>navBtn(k)).join('')+S.custom.map(t=>navBtn('custom:'+t.name,'🧩 '+t.name)).join('');root.innerHTML=`<div class="app"><aside class="side"><div class="brand">⚡ Marketing Hub</div><div class="user"><b>${esc(S.user.email)}</b><br><span class="hint">zalogowano</span></div><nav class="nav">${nav}</nav></aside><main class="main"><div class="top"><input class="inp" placeholder="Szukaj" value="${esc(S.q)}" id="search"><button class="btn" onclick="openForm(defaultType())">+ Dodaj</button><button class="btn sec" onclick="seed()">Dane startowe</button><button class="btn sec" onclick="sb.auth.signOut()">Wyloguj</button></div>${screen()}</main></div>`;document.getElementById('search').oninput=e=>{S.q=e.target.value;renderApp()}}
function navBtn(k,label){let on=S.view===k?'on':'';let txt=label||MODULES[k][0]+' '+MODULES[k][1];return `<button class="${on}" onclick="S.view='${k}';renderApp()">${txt}</button>`}
function defaultType(){return TYPES[S.view]||'task'} function title(t,d,btn=''){return `<div class="title"><div><h1>${t}</h1><p class="hint">${d}</p></div>${btn}</div>`}
function screen(){if(S.view==='dashboard')return dashboard();if(S.view==='calendar')return calendar();if(S.view==='warehouse')return warehouse();if(S.view==='files')return files();if(S.view==='settings')return settings();if(S.view==='custom')return customTabs();if(S.view.startsWith('custom:'))return customList(S.view.slice(7));let t=defaultType();return list(t,MODULES[S.view]?.[1]||'Moduł')}
function dashboard(){let cost=type('finance').reduce((a,b)=>a+(+b.amount||0),0);return title('Dashboard','Podsumowanie pracy marketingu')+`<div class="grid g4"><div class="card metric"><span>Zadania</span><br><b>${type('task').length}</b></div><div class="card metric"><span>Projekty</span><br><b>${type('project').length}</b></div><div class="card metric"><span>Wydarzenia</span><br><b>${type('event').length}</b></div><div class="card metric"><span>Koszty</span><br><b>${cost} zł</b></div></div><div class="grid g2" style="margin-top:14px"><div class="card"><h2>Najbliższe deadline'y</h2>${items(type('task').concat(type('event')).filter(x=>x.due||x.date).slice(0,6))}</div><div class="card"><h2>Ostatnie pliki</h2>${items(type('file').slice(0,6))}</div></div>`}
function list(t,label){let arr=filtered(type(t));return title(label,'Dodawanie, edycja, szczegóły, usuwanie, opisy i powiązania.',`<button class="btn" onclick="openForm('${t}')">+ Dodaj</button>`)+`<div class="grid g2">${arr.map(card).join('')||'<div class="card">Brak danych.</div>'}</div>`}
function card(x){let name=x.name||x.title||'(bez nazwy)', sub=x.status||x.kind||x.channel||x.date||x.due||x.email||'';return `<div class="card"><div class="row"><div><h2>${esc(name)}</h2><p class="hint">${esc(sub)}</p></div><span class="tag">${esc(x.priority||x.place||x.visibility||'team')}</span></div><p>${esc((x.description||x.brief||x.notes||x.body||'').slice(0,160))}</p><button class="btn small sec" onclick="details('${x.id}')">Szczegóły</button> <button class="btn small" onclick="openForm(null,'${x.id}')">Edytuj</button> <button class="btn small danger" onclick="removeItem('${x.id}')">Usuń</button></div>`}
function items(arr){return arr.map(x=>`<div class="item"><div><h4>${esc(x.name||x.title)}</h4><p class="hint">${esc(x.status||x.date||x.due||'')}</p></div></div>`).join('')||'<p class="hint">Brak.</p>'}
function iso(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')} function sameDay(a,b){return a===b} function monthName(){return new Date(S.calYear,S.calMonth,1).toLocaleDateString('pl-PL',{month:'long',year:'numeric'})}
function calItems(){let arr=[];type('event').forEach(x=>{if(x.date)arr.push({...x,calDate:x.date,calType:(x.kind||'event').toLowerCase(),calGroup:'events',calLabel:x.kind||'Wydarzenie'})});type('social').forEach(x=>{if(x.date)arr.push({...x,calDate:x.date,calType:'social',calGroup:'social',calLabel:x.channel||'SM'})});type('task').forEach(x=>{if(x.due)arr.push({...x,calDate:x.due,calType:'deadline',calGroup:'deadlines',calLabel:'Deadline'})});type('project').forEach(x=>{if(x.due)arr.push({...x,calDate:x.due,calType:'campaign',calGroup:'campaigns',calLabel:x.kind||'Projekt'})});type('creative').forEach(x=>{if(x.due)arr.push({...x,calDate:x.due,calType:'deadline',calGroup:'deadlines',calLabel:'Kreacja'})});return arr.filter(x=>{let f=S.calFilter;if(f==='all')return true;if(f==='webinars')return String(x.kind||'').toLowerCase()==='webinar';if(f==='fairs')return String(x.kind||'').toLowerCase()==='targi';return x.calGroup===f})}
function setCal(m,y){S.calMonth=m;S.calYear=y;renderApp()} function moveCal(delta){let d=new Date(S.calYear,S.calMonth+delta,1);setCal(d.getMonth(),d.getFullYear())} function goToday(){let d=new Date();setCal(d.getMonth(),d.getFullYear())}
function calendar(){let filters=[['all','Ogólny'],['social','Kalendarz SM'],['events','Wydarzenia'],['webinars','Webinary'],['fairs','Targi'],['campaigns','Kampanie'],['deadlines','Deadline’y']];let first=new Date(S.calYear,S.calMonth,1), days=new Date(S.calYear,S.calMonth+1,0).getDate(), start=(first.getDay()+6)%7, todayIso=new Date().toISOString().slice(0,10), ev=calItems();let cells=[];for(let i=0;i<start;i++)cells.push('<div class="day emptyday"></div>');for(let d=1;d<=days;d++){let date=iso(S.calYear,S.calMonth,d), list=ev.filter(x=>sameDay(x.calDate,date));cells.push(`<div class="day ${date===todayIso?'today':''}"><div class="daynum"><span>${d}</span>${date===todayIso?'<span class="tag">dziś</span>':''}</div>${list.map(x=>`<div class="ev ${esc(x.calType)}" onclick="details('${x.id}')"><b>${esc(x.calLabel)}</b> ${esc(x.name||x.title)}</div>`).join('')}</div>`)}return title('Kalendarz marketingu','Planowanie po miesiącach i latach: ogólny kalendarz, SM, wydarzenia, webinary, targi, kampanie i deadline’y.',`<button class="btn" onclick="openForm('event')">+ Wydarzenie</button>`)+`<div class="card"><div class="caltools"><button class="btn sec" onclick="moveCal(-12)">« Rok</button><button class="btn sec" onclick="moveCal(-1)">‹ Miesiąc</button><button class="btn" onclick="goToday()">Dzisiaj</button><button class="btn sec" onclick="moveCal(1)">Miesiąc ›</button><button class="btn sec" onclick="moveCal(12)">Rok »</button><select class="inp" style="max-width:130px" onchange="setCal(S.calMonth,+this.value)">${Array.from({length:9},(_,i)=>S.calYear-4+i).map(y=>`<option ${y===S.calYear?'selected':''}>${y}</option>`).join('')}</select><h2 style="margin:0 0 0 8px;text-transform:capitalize">${monthName()}</h2></div><div class="caltools">${filters.map(f=>`<button class="btn sec ${S.calFilter===f[0]?'on':''}" onclick="S.calFilter='${f[0]}';renderApp()">${f[1]}</button>`).join('')}</div><div class="cal"><div class="weekday">Pon</div><div class="weekday">Wt</div><div class="weekday">Śr</div><div class="weekday">Czw</div><div class="weekday">Pt</div><div class="weekday">Sob</div><div class="weekday">Nd</div>${cells.join('')}</div></div>`}
function warehouse(){let arr=filtered(type('warehouse')), biuro=arr.filter(x=>x.place!=='Garaż'), garaz=arr.filter(x=>x.place==='Garaż');let col=a=>a.map(x=>`<div class="item"><div><h4>${esc(x.name)}</h4><p class="hint">${esc(x.category||'')} · ${x.qty||0} szt. · min ${x.min||0}</p></div><div><button class="btn small" onclick="openForm(null,'${x.id}')">Edytuj</button> <button class="btn small danger" onclick="removeItem('${x.id}')">Usuń</button></div></div>`).join('')||'<p class="hint">Pusto.</p>';return title('Magazyn','Podział na Biuro i Garaż, ilości, minimum, lokalizacja i opis.',`<button class="btn" onclick="openForm('warehouse')">+ Dodaj materiał</button>`)+`<div class="grid g2"><div class="card"><h2>Biuro</h2>${col(biuro)}</div><div class="card"><h2>Garaż</h2>${col(garaz)}</div></div>`}
function files(){return title('Pliki','Upload, pobieranie i przypisywanie plików do pracy marketingu.')+`<div class="card"><div class="drop" onclick="fileInput.click()">Kliknij lub przeciągnij pliki<input id="fileInput" type="file" multiple hidden></div>${items(type('file'))}</div>`}
function customTabs(){return title('Własne zakładki','Dodawaj własne zakładki i elementy, gdy pojawi się nowy typ pracy.',`<button class="btn" onclick="addTab()">+ Zakładka</button>`)+`<div class="grid g2">${S.custom.map(t=>`<div class="card"><h2>${esc(t.name)}</h2><button class="btn" onclick="S.view='custom:${esc(t.name)}';renderApp()">Otwórz</button> <button class="btn danger" onclick="removeItem('${t.id}')">Usuń</button></div>`).join('')||'<div class="card">Brak własnych zakładek.</div>'}</div>`}
function customList(tab){let arr=filtered(type('custom').filter(x=>x.tab===tab));return title(tab,'Własna zakładka z opisami, statusami i terminami.',`<button class="btn" onclick="openForm('custom',null,'${esc(tab)}')">+ Dodaj</button>`)+`<div class="grid g2">${arr.map(card).join('')||'<div class="card">Brak danych.</div>'}</div>`}
function settings(){return title('Ustawienia','Konto, hasło, konfiguracja, motyw i integracje')+`<div class="grid g2"><div class="card"><h2>Konto</h2><p>${esc(S.user.email)}</p><input class="inp" type="password" id="np1" placeholder="Nowe hasło"><br><br><input class="inp" type="password" id="np2" placeholder="Powtórz hasło"><br><br><button class="btn" onclick="changePass()">Zmień hasło</button></div><div class="card"><h2>Integracje</h2>${['Dropbox','Google Calendar','Meta Ads','Google Ads','Bitrix/CRM','Slack/Teams'].map(x=>`<span class="tag">${x}</span>`).join('')}<hr><button class="btn sec" onclick="localStorage.removeItem('mh-config');location.reload()">Zmień Supabase</button></div></div>`}
function formHtml(t,data={}){let fs=fields[t]||fields.custom;return `<div class="fg">${fs.map(f=>{let [k,l,tp,opt]=f,v=data[k]||'';let full=tp==='textarea'?'full':'';if(tp==='select')return `<label class="${full}"><b>${l}</b><select class="inp" id="f_${k}">${opt.split('|').map(o=>`<option ${v==o?'selected':''}>${o}</option>`).join('')}</select></label>`;if(tp==='textarea')return `<label class="full"><b>${l}</b><textarea class="inp area" id="f_${k}">${esc(v)}</textarea></label>`;return `<label class="${full}"><b>${l}</b><input class="inp" type="${tp||'text'}" id="f_${k}" value="${esc(v)}"></label>`}).join('')}</div>`}
function openForm(t,id,tab){let row=id?raw(id):null;t=t||row.type;let data=row?row.data||{}:{};if(tab)data.tab=tab;modal.className='modal on';modal.innerHTML=`<div class="box"><div class="row"><h2>${id?'Edytuj':'Dodaj'} ${t}</h2><button class="btn sec" onclick="closeM()">✕</button></div>${formHtml(t,data)}<br><button class="btn" onclick="saveItem('${t}','${id||''}')">Zapisz</button></div>`}
function closeM(){modal.className='modal';modal.innerHTML=''}
async function saveItem(t,id){let data={}, fs=fields[t]||fields.custom;fs.forEach(f=>{let k=f[0], el=document.getElementById('f_'+k);data[k]=el?el.value:''});if(data.items)data.items=data.items.split('\n').filter(Boolean);let res=id?await sb.from('marketing_items').update({data,visibility:data.visibility||'team'}).eq('id',id):await sb.from('marketing_items').insert({type:t,data,visibility:data.visibility||'team',owner_id:S.user.id});if(res.error)return toast(res.error.message);closeM();await load();toast('Zapisano')}
function details(id){let r=raw(id), d=r.data||{};modal.className='modal on';modal.innerHTML=`<div class="box"><div class="row"><h2>${esc(d.name||d.title||'Szczegóły')}</h2><button class="btn sec" onclick="closeM()">✕</button></div><pre style="white-space:pre-wrap;background:#f8fafc;padding:12px;border-radius:12px">${esc(JSON.stringify(d,null,2))}</pre><button class="btn" onclick="openForm(null,'${id}')">Edytuj</button> <button class="btn danger" onclick="removeItem('${id}')">Usuń</button></div>`}
async function removeItem(id){if(!confirm('Usunąć?'))return;let r=raw(id);if(r?.type==='file'&&r.data?.path)await sb.storage.from('marketing-files').remove([r.data.path]);let res=await sb.from('marketing_items').delete().eq('id',id);if(res.error)return toast(res.error.message);closeM();await load();toast('Usunięto')}
async function addTab(){let name=prompt('Nazwa nowej zakładki');if(!name)return;let r=await sb.from('marketing_items').insert({type:'custom_tab',data:{name},visibility:'team',owner_id:S.user.id});if(r.error)return toast(r.error.message);await load()}
async function changePass(){let a=np1.value,b=np2.value;if(a.length<6)return toast('Hasło musi mieć minimum 6 znaków');if(a!==b)return toast('Hasła nie są takie same');let r=await sb.auth.updateUser({password:a});toast(r.error?r.error.message:'Hasło zmienione')}
async function seed(){let rows=[['task',{title:'Przygotować mailing',status:'Do zrobienia',priority:'Wysoki',due:'2026-07-01'}],['project',{name:'Kampania webinarowa',kind:'Kampania',status:'W trakcie',budget:'4200',due:'2026-07-10',description:'Landing, mailing, social, kreacje i follow-up.'}],['event',{name:'Webinar Rejestracja 2.0',kind:'Webinar',date:'2026-07-10',status:'W przygotowaniu',place:'online'}],['social',{title:'Post zapraszający na webinar',channel:'LinkedIn',date:'2026-06-28',status:'Draft'}],['creative',{name:'Key visual webinaru',format:'LinkedIn + mailing',status:'Brief',due:'2026-06-27'}],['partner',{name:'Drukarnia Premium Print',kind:'Dostawca',person:'Marta',email:'druk@example.pl'}],['warehouse',{name:'Roll-up FELG Dent',place:'Garaż',qty:'3',min:'1',category:'Targi'}],['warehouse',{name:'Smycze',place:'Biuro',qty:'120',min:'50',category:'Gadżety'}],['finance',{name:'Canva Pro',kind:'Subskrypcja',status:'Subskrypcja',amount:'55',due:'2026-07-01'}],['template',{name:'Webinar',items:['Landing','Mailing','Grafiki','Prezentacja','Nagranie','Mail po wydarzeniu']}]];let res=await sb.from('marketing_items').insert(rows.map(x=>({type:x[0],data:x[1],visibility:'team',owner_id:S.user.id})));if(res.error)return toast(res.error.message);await load();toast('Dodano dane startowe')}
window.addEventListener('change',async e=>{if(e.target.id==='fileInput'){for(let f of e.target.files){let path=S.user.id+'/'+Date.now()+'-'+f.name;let up=await sb.storage.from('marketing-files').upload(path,f);if(up.error){toast(up.error.message);continue}await sb.from('marketing_items').insert({type:'file',data:{name:f.name,size:f.size,path},visibility:'team',owner_id:S.user.id})}await load()}});
init();
</script></body></html>
