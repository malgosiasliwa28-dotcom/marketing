<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Marketing Hub</title>
  <link rel="stylesheet" href="styles.css?v=20260624-login-fix" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    window.addEventListener('error', function(e){
      var root = document.getElementById('root');
      if(root && !root.innerHTML){
        root.innerHTML = '<div style="padding:24px;font-family:Arial"><h2>Błąd aplikacji</h2><p>'+String(e.message)+'</p><p>Odśwież stronę lub zrób redeploy w Netlify.</p></div>';
      }
    });
  </script>
  <script src="app.js?v=20260624-login-fix"></script>
</body>
</html>
