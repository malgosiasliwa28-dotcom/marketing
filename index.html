<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketing Hub</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Arial,system-ui;background:#f6f7fb;color:#111827}button,input,select,textarea{font:inherit}.btn{border:0;border-radius:12px;padding:10px 14px;background:#2563eb;color:white;font-weight:800;cursor:pointer}.sec{background:white;color:#111827;border:1px solid #e5e7eb}.danger{background:#ef4444}.small{font-size:12px;padding:7px 9px}.inp{width:100%;border:1px solid #e5e7eb;border-radius:12px;padding:10px;background:white}.area{min-height:90px}.hint{color:#64748b;font-size:13px}.login{min-height:100vh;display:grid;place-items:center;padding:20px}.loginbox{width:min(980px,100%);display:grid;grid-template-columns:1fr 1fr;background:white;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px #0f172a22}.hero{padding:38px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:white}.form{padding:34px;display:flex;flex-direction:column;gap:10px}.tabs{display:flex;gap:8px}.tabs button{flex:1}.on{background:#111827!important;color:white!important}.msg{padding:10px;border-radius:12px;background:#dbeafe;color:#1e40af}.app{height:100vh;display:grid;grid-template-columns:285px 1fr}.side{background:white;border-right:1px solid #e5e7eb;padding:18px;overflow:auto}.brand{font-size:21px;font-weight:950;margin-bottom:14px}.user{border:1px solid #e5e7eb;border-radius:16px;padding:12px;margin-bottom:12px}.nav button{display:block;width:100%;text-align:left;border:0;background:white;color:#64748b;font-weight:800;border-radius:12px;padding:10px;margin:3px 0}.nav button.on{background:#dbeafe!important;color:#111827!important}.main{height:100vh;overflow:auto;padding:20px 24px 50px}.top{position:sticky;top:0;background:#f6f7fb;z-index:5;display:grid;grid-template-columns:1fr auto auto auto;gap:10px;padding-bottom:15px}.title{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin:8px 0 18px}.title h1{margin:0;font-size:34px}.grid{display:grid;gap:14px}.g2{grid-template-columns:repeat(2,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.card{background:white;border:1px solid #e5e7eb;border-radius:18px;padding:16px;box-shadow:0 10px 30px #0f172a10}.metric b{font-size:32px}.item{border:1px solid #e5e7eb;background:white;border-radius:14px;padding:12px;margin:8px 0}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.tag{display:inline-block;border-radius:99px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:800;padding:4px 8px;margin:2px}.modal{position:fixed;inset:0;background:#0f172a99;display:none;place-items:center;padding:20px;z-index:50}.modal.on{display:grid}.box{width:min(900px,100%);max-height:92vh;overflow:auto;background:white;border-radius:24px;padding:22px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}.caltools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.weekday{text-align:center;font-weight:900;color:#64748b}.day{min-height:132px;background:white;border:1px solid #e5e7eb;border-radius:14px;padding:8px}.empty{background:#f8fafc}.today{border:2px solid #2563eb;box-shadow:0 0 0 4px #2563eb22}.daynum{font-weight:900;display:flex;justify-content:space-between;align-items:center}.plus{border:0;background:#dbeafe;color:#1d4ed8;border-radius:8px;padding:3px 7px;font-weight:900}.ev{font-size:11px;border-radius:8px;padding:5px;margin-top:5px;cursor:pointer;background:#dbeafe}.ev.social{background:#fee2e2}.ev.event{background:#dcfce7}.ev.deadline{background:#fef3c7}.ev.campaign{background:#ede9fe}.drop{border:2px dashed #2563eb;border-radius:16px;padding:18px;text-align:center;background:#dbeafe}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:white;padding:12px 14px;border-radius:14px;font-weight:800;z-index:80}@media(max-width:900px){.app,.loginbox,.g4,.g2,.fg,.cal{grid-template-columns:1fr}.app{height:auto}.main{height:auto}.top{grid-template-columns:1fr}.weekday{display:none}}</style></head><body><div id="root"></div><div id="modal" class="modal"></div><script>
const root=document.getElementById('root'),modal=document.getElementById('modal');let cfg={supabaseUrl:'',supabaseAnonKey:'',allowedDomain:'felg.app'};try{cfg={...cfg,...JSON.parse(localStorage.getItem('mh-config')||'{}')}}catch(e){}let sb=cfg.supabaseUrl&&cfg.supabaseAnonKey&&window.supabase?window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey):null;let n=new Date();let S={user:null,items:[],view:'dashboard',mode:'login',q:'',msg:'',y:n.getFullYear(),m:n.getMonth(),filter:'all'};
const modules={dashboard:'🏠 Dashboard',calendar:'📅 Kalendarz',tasks:'✅ Zadania',projects:'📁 Projekty i kampanie',events:'🎤 Wydarzenia',social:'📱 Social Media',creative:'🎨 Kreacje',partners:'🤝 Partnerzy',files:'🗂️ Pliki',warehouse:'📦 Magazyn',finance:'💳 Faktury i koszty',checks:'☑️ Checklisty',notes:'📝 Notatki',settings:'⚙️ Ustawienia'};const map={tasks:'task',projects:'project',events:'event',social:'social',creative:'creative',partners:'partner',warehouse:'warehouse',finance:'finance',checks:'template',notes:'note'};
const fields={task:[['title','Nazwa'],['status','Status','select','Do zrobienia|W trakcie|Do sprawdzenia|Gotowe'],['priority','Priorytet','select','Niski|Normalny|Wysoki|Pilne'],['due','Termin','date'],['owner','Odpowiedzialny'],['description','Opis','textarea']],project:[['name','Nazwa'],['kind','Typ','select','Projekt|Kampania'],['status','Status','select','Pomysł|Planowanie|W trakcie|Do akceptu|Zakończone'],['budget','Budżet','number'],['due','Deadline','date'],['description','Opis','textarea']],event:[['name','Nazwa działania w kalendarzu'],['kind','Typ','select','Webinar|Targi|Event|Spotkanie|Deadline|Kampania|Social Media|Inne'],['calendar_bucket','Widok kalendarza','select','Ogólny|Social Media|Wydarzenia|Webinary|Targi|Kampanie|Deadline’y'],['date','Data','date'],['time','Godzina startu'],['end_time','Godzina końca'],['status','Status','select','Pomysł|Plan|W przygotowaniu|Do akceptu|Gotowe|Po wydarzeniu|Anulowane'],['owner','Osoba odpowiedzialna'],['host','Prowadzący / organizator'],['place','Miejsce / link do spotkania'],['registration_link','Link do zapisów / landing'],['project','Powiązany projekt lub kampania'],['budget','Budżet / koszt planowany','number'],['participants','Uczestnicy / grupa docelowa'],['materials','Materiały potrzebne','textarea'],['checklist','Checklista / rzeczy do dopilnowania','textarea'],['notes','Notatki organizacyjne','textarea'],['description','Opis szczegółowy','textarea']],social:[['title','Tytuł'],['channel','Kanał','select','LinkedIn|Facebook|Instagram|TikTok|YouTube|Newsletter'],['date','Data publikacji','date'],['status','Status','select','Pomysł|Draft|Do akceptu|Zaplanowane|Opublikowane'],['copy','Treść','textarea']],creative:[['name','Nazwa'],['format','Format'],['status','Status','select','Brief|W trakcie|Do akceptu|Poprawki|Gotowe'],['due','Deadline','date'],['brief','Brief','textarea']],partner:[['name','Nazwa'],['kind','Typ','select','Wykonawca|Dostawca|Media|Organizator|Partner biznesowy|Inne'],['person','Osoba'],['email','E-mail'],['phone','Telefon'],['notes','Notatki','textarea']],warehouse:[['name','Nazwa'],['place','Miejsce','select','Biuro|Garaż'],['qty','Ilość','number'],['min','Minimum','number'],['category','Kategoria'],['location','Lokalizacja'],['notes','Opis','textarea']],finance:[['name','Nazwa faktury / kosztu / narzędzia'],['marketing_for','Za co jest koszt?','textarea'],['kind','Typ kosztu','select','Faktura marketingowa|Koszt kampanii|Subskrypcja|Narzędzie płatne|Reklama płatna|Usługa zewnętrzna|Druk / materiały|Inne'],['tool_name','Nazwa narzędzia / usługi'],['supplier','Dostawca / wykonawca'],['amount','Kwota','number'],['currency','Waluta','select','PLN|EUR|USD|GBP'],['status','Status płatności','select','Do opłacenia|Opłacone|Automatycznie pobierane|Subskrypcja aktywna|Wstrzymane|Anulowane'],['due','Do kiedy opłacić','date'],['invoice_date','Data faktury','date'],['invoice_number','Numer faktury'],['billing_period','Okres rozliczenia','select','Jednorazowo|Miesięcznie|Rocznie|Kwartalnie|Inny'],['is_subscription','Czy to subskrypcja?','select','Nie|Tak'],['auto_charge','Czy schodzi automatycznie z karty?','select','Nie|Tak'],['payment_method','Metoda płatności','select','Przelew|Karta firmowa|Automatycznie z karty|PayPal|Inne'],['card_owner','Karta / osoba odpowiedzialna'],['project','Powiązany projekt / kampania'],['owner','Osoba odpowiedzialna za koszt'],['notes','Notatki / uwagi księgowe','textarea']],template:[['name','Nazwa'],['items','Punkty checklisty - każdy w nowej linii','textarea']],note:[['title','Tytuł'],['body','Treść','textarea'],['visibility','Widoczność','select','private|team']]};
function esc(x){return String(x??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function toast(t){let d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),5500)}function type(t){return S.items.filter(i=>i.type===t).map(i=>({id:i.id,visibility:i.visibility,owner_id:i.owner_id,...(i.data||{})}))}function raw(id){return S.items.find(i=>i.id===id)}function filtered(a){let q=S.q.toLowerCase();return !q?a:a.filter(x=>JSON.stringify(x).toLowerCase().includes(q))}
async function init(){if(!sb)return config();let r=await sb.auth.getSession();S.user=r.data.session?.user||null;sb.auth.onAuthStateChange((e,s)=>{S.user=s?.user||null;S.user?load():authScreen()});S.user?load():authScreen()}async function load(){let r=await sb.from('marketing_items').select('*').order('created_at',{ascending:false});if(r.error){toast('Błąd ładowania: '+r.error.message);S.items=[]}else S.items=r.data||[];app()}
function config(){root.innerHTML=`<div class="login"><div class="loginbox"><div class="hero"><h1>Marketing Hub</h1><p>Podłącz Supabase.</p></div><div class="form"><input id="u" class="inp" placeholder="SUPABASE_URL"><input id="k" class="inp" placeholder="SUPABASE_ANON_KEY"><input id="d" class="inp" value="${esc(cfg.allowedDomain)}"><button id="save" class="btn">Zapisz</button></div></div></div>`;save.onclick=()=>{localStorage.setItem('mh-config',JSON.stringify({supabaseUrl:u.value.trim(),supabaseAnonKey:k.value.trim(),allowedDomain:d.value.trim()||'felg.app'}));location.reload()}}
function authScreen(){let title=S.mode==='login'?'Zaloguj':S.mode==='signup'?'Utwórz konto':'Reset hasła';root.innerHTML=`<div class="login"><div class="loginbox"><div class="hero"><h1>Marketing Hub</h1><p>Dostęp tylko @${cfg.allowedDomain}</p></div><div class="form"><div class="tabs"><button class="btn sec ${S.mode==='login'?'on':''}" onclick="S.mode='login';authScreen()">Zaloguj</button><button class="btn sec ${S.mode==='signup'?'on':''}" onclick="S.mode='signup';authScreen()">Utwórz</button><button class="btn sec ${S.mode==='reset'?'on':''}" onclick="S.mode='reset';authScreen()">Reset</button></div>${S.msg?`<div class="msg">${esc(S.msg)}</div>`:''}<input id="email" class="inp" value="malgorzata.sliwa@felg.app"><input id="pass" class="inp" type="password" placeholder="hasło" style="${S.mode==='reset'?'display:none':''}"><button id="go" class="btn">${title}</button></div></div></div>`;go.onclick=authGo}async function authGo(){let email=document.getElementById('email').value.trim(),pass=document.getElementById('pass').value;if(!email.endsWith('@'+cfg.allowedDomain)){S.msg='Dostęp tylko dla @'+cfg.allowedDomain;return authScreen()}try{if(S.mode==='login'){let r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error;S.user=r.data.user;await load()}if(S.mode==='signup'){let r=await sb.auth.signUp({email,password:pass,options:{emailRedirectTo:location.origin}});if(r.error)throw r.error;S.msg='Konto utworzone. Potwierdź mail.';authScreen()}if(S.mode==='reset'){let r=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin});if(r.error)throw r.error;S.msg='Wysłano reset hasła.';authScreen()}}catch(e){S.msg=e.message;authScreen()}}
function app(){let nav=Object.keys(modules).map(k=>`<button class="${S.view===k?'on':''}" onclick="S.view='${k}';app()">${modules[k]}</button>`).join('');root.innerHTML=`<div class="app"><aside class="side"><div class="brand">⚡ Marketing Hub</div><div class="user"><b>${esc(S.user.email)}</b><br><span class="hint">zalogowano</span></div><nav class="nav">${nav}</nav></aside><main class="main"><div class="top"><input id="search" class="inp" placeholder="Szukaj" value="${esc(S.q)}"><button class="btn" onclick="openForm(defaultType())">+ Dodaj</button><button class="btn sec" onclick="seed()">Dane startowe</button><button class="btn sec" onclick="sb.auth.signOut()">Wyloguj</button></div>${screen()}</main></div>`;search.oninput=e=>{S.q=e.target.value;app()}}
function defaultType(){return map[S.view]||'task'}function title(t,d,b=''){return `<div class="title"><div><h1>${t}</h1><p class="hint">${d}</p></div>${b}</div>`}function screen(){if(S.view==='dashboard')return dashboard();if(S.view==='calendar')return calendar();if(S.view==='warehouse')return warehouse();if(S.view==='files')return files();if(S.view==='settings')return settings();return list(defaultType(),modules[S.view])}
function dashboard(){let cost=type('finance').reduce((a,b)=>a+(+b.amount||0),0);return title('Dashboard','Podsumowanie')+`<div class="grid g4"><div class="card metric">Zadania<br><b>${type('task').length}</b></div><div class="card metric">Projekty<br><b>${type('project').length}</b></div><div class="card metric">Wydarzenia<br><b>${type('event').length}</b></div><div class="card metric">Koszty<br><b>${cost} zł</b></div></div>`}function list(t,label){let arr=filtered(type(t));return title(label,'Dodawanie, edycja, szczegóły i usuwanie.',`<button class="btn" onclick="openForm('${t}')">+ Dodaj</button>`)+`<div class="grid g2">${arr.map(card).join('')||'<div class="card">Brak danych.</div>'}</div>`}function card(x){let n=x.name||x.title||'(bez nazwy)',s=x.status||x.kind||x.channel||x.date||x.due||x.email||'';return `<div class="card"><h2>${esc(n)}</h2><p class="hint">${esc(s)}</p><p>${esc((x.marketing_for||x.description||x.brief||x.notes||x.body||'').slice(0,180))}</p><button class="btn small sec" onclick="details('${x.id}')">Szczegóły</button> <button class="btn small" onclick="openForm(null,'${x.id}')">Edytuj</button> <button class="btn small danger" onclick="removeItem('${x.id}')">Usuń</button></div>`}
function iso(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}function monthName(){return new Date(S.y,S.m,1).toLocaleDateString('pl-PL',{month:'long',year:'numeric'})}function calItems(){let a=[];type('event').forEach(x=>x.date&&a.push({...x,calDate:x.date,calType:(x.kind||'event').toLowerCase(),group:'events',label:x.kind||'Wydarzenie'}));type('social').forEach(x=>x.date&&a.push({...x,calDate:x.date,calType:'social',group:'social',label:x.channel||'SM'}));type('task').forEach(x=>x.due&&a.push({...x,calDate:x.due,calType:'deadline',group:'deadlines',label:'Deadline'}));type('project').forEach(x=>x.due&&a.push({...x,calDate:x.due,calType:'campaign',group:'campaigns',label:x.kind||'Kampania'}));type('creative').forEach(x=>x.due&&a.push({...x,calDate:x.due,calType:'deadline',group:'deadlines',label:'Kreacja'}));return a.filter(x=>S.filter==='all'||(S.filter==='webinars'?String(x.kind).toLowerCase()==='webinar':x.group===S.filter))}function moveCal(d){let x=new Date(S.y,S.m+d,1);S.y=x.getFullYear();S.m=x.getMonth();app()}function goToday(){let d=new Date();S.y=d.getFullYear();S.m=d.getMonth();app()}
function calendar(){let fs=[['all','Ogólny'],['social','Kalendarz SM'],['events','Wydarzenia'],['webinars','Webinary'],['campaigns','Kampanie'],['deadlines','Deadline’y']];let first=new Date(S.y,S.m,1),days=new Date(S.y,S.m+1,0).getDate(),start=(first.getDay()+6)%7,today=new Date().toISOString().slice(0,10),ev=calItems(),cells=[];for(let i=0;i<start;i++)cells.push('<div class="day empty"></div>');for(let d=1;d<=days;d++){let date=iso(S.y,S.m,d),list=ev.filter(x=>x.calDate===date);cells.push(`<div class="day ${date===today?'today':''}"><div class="daynum"><span>${d}</span><button class="plus" onclick="openCalAdd('${date}')">+</button>${date===today?'<span class="tag">dziś</span>':''}</div>${list.map(x=>`<div class="ev ${esc(x.calType)}" onclick="calDetails('${x.id}')"><b>${esc(x.label)}</b> ${esc(x.name||x.title)}</div>`).join('')}</div>`)}return title('Kalendarz marketingu','Plus na dniu dodaje element z gotową datą. Kliknięcie wpisu otwiera edycję/usuwanie.',`<button class="btn" onclick="openForm('event')">+ Wydarzenie</button>`)+`<div class="card"><div class="caltools"><button class="btn sec" onclick="moveCal(-12)">« Rok</button><button class="btn sec" onclick="moveCal(-1)">‹ Miesiąc</button><button class="btn" onclick="goToday()">Dzisiaj</button><button class="btn sec" onclick="moveCal(1)">Miesiąc ›</button><button class="btn sec" onclick="moveCal(12)">Rok »</button><h2 style="margin:0;text-transform:capitalize">${monthName()}</h2></div><div class="caltools">${fs.map(f=>`<button class="btn sec ${S.filter===f[0]?'on':''}" onclick="S.filter='${f[0]}';app()">${f[1]}</button>`).join('')}</div><div class="cal"><div class="weekday">Pon</div><div class="weekday">Wt</div><div class="weekday">Śr</div><div class="weekday">Czw</div><div class="weekday">Pt</div><div class="weekday">Sob</div><div class="weekday">Nd</div>${cells.join('')}</div></div>`}
function openCalAdd(date){modal.className='modal on';modal.innerHTML=`<div class="box"><div class="row"><h2>Dodaj do kalendarza: ${date}</h2><button class="btn sec" onclick="closeM()">✕</button></div><div class="grid g2"><button class="btn" onclick="openFormDate('event','${date}')">Wydarzenie / webinar / targi</button><button class="btn" onclick="openFormDate('social','${date}')">Post Social Media</button><button class="btn" onclick="openFormDate('task','${date}')">Deadline zadania</button><button class="btn" onclick="openFormDate('project','${date}')">Deadline kampanii</button><button class="btn" onclick="openFormDate('creative','${date}')">Deadline kreacji</button></div></div>`}function openFormDate(t,date){let data={};if(['event','social'].includes(t))data.date=date;else data.due=date;openForm(t,null,null,data)}function calDetails(id){details(id)}
function warehouse(){let arr=filtered(type('warehouse')),b=arr.filter(x=>x.place!=='Garaż'),g=arr.filter(x=>x.place==='Garaż');let col=a=>a.map(x=>`<div class="item"><div><b>${esc(x.name)}</b><p class="hint">${esc(x.category||'')} · ${x.qty||0} szt.</p></div><button class="btn small" onclick="openForm(null,'${x.id}')">Edytuj</button> <button class="btn small danger" onclick="removeItem('${x.id}')">Usuń</button></div>`).join('')||'<p class="hint">Pusto.</p>';return title('Magazyn','Biuro i Garaż',`<button class="btn" onclick="openForm('warehouse')">+ Dodaj</button>`)+`<div class="grid g2"><div class="card"><h2>Biuro</h2>${col(b)}</div><div class="card"><h2>Garaż</h2>${col(g)}</div></div>`}function files(){return title('Pliki','Upload plików')+`<div class="card"><div class="drop" onclick="fileInput.click()">Kliknij, aby wgrać pliki<input id="fileInput" type="file" multiple hidden></div>${type('file').map(x=>`<div class="item"><b>${esc(x.name)}</b><button class="btn small sec" onclick="downloadFile('${x.id}')">Pobierz</button></div>`).join('')}</div>`}function settings(){return title('Ustawienia','Konto i hasło')+`<div class="grid g2"><div class="card"><h2>Konto</h2><p>${esc(S.user.email)}</p><input class="inp" type="password" id="np1" placeholder="Nowe hasło"><br><br><input class="inp" type="password" id="np2" placeholder="Powtórz hasło"><br><br><button class="btn" onclick="changePass()">Zmień hasło</button></div><div class="card"><button class="btn sec" onclick="localStorage.removeItem('mh-config');location.reload()">Zmień Supabase</button></div></div>`}
function formHtml(t,data={}){let fs=fields[t]||fields.task;return `<div class="fg">${fs.map(f=>{let[k,l,tp,opt]=f,v=data[k]||'';if(tp==='select')return `<label><b>${l}</b><select class="inp" id="f_${k}">${opt.split('|').map(o=>`<option ${v==o?'selected':''}>${o}</option>`).join('')}</select></label>`;if(tp==='textarea')return `<label class="full"><b>${l}</b><textarea class="inp area" id="f_${k}">${esc(v)}</textarea></label>`;return `<label><b>${l}</b><input class="inp" type="${tp||'text'}" id="f_${k}" value="${esc(v)}"></label>`}).join('')}</div>`}function openForm(t,id,tab,preset={}){let row=id?raw(id):null;t=t||row.type;let data=row?row.data||{}:{...preset};modal.className='modal on';modal.innerHTML=`<div class="box"><div class="row"><h2>${id?'Edytuj':'Dodaj'} ${t}</h2><button class="btn sec" onclick="closeM()">✕</button></div>${formHtml(t,data)}<br><button class="btn" onclick="saveItem('${t}','${id||''}')">Zapisz</button></div>`}function closeM(){modal.className='modal';modal.innerHTML=''}
async function saveItem(t,id){let data={},fs=fields[t]||fields.task;fs.forEach(f=>{let k=f[0],el=document.getElementById('f_'+k);data[k]=el?el.value:''});if(data.items)data.items=data.items.split('\n').filter(Boolean);let r=id?await sb.from('marketing_items').update({data,visibility:data.visibility||'team'}).eq('id',id).select():await sb.from('marketing_items').insert({type:t,data,visibility:data.visibility||'team',owner_id:S.user.id}).select();if(r.error)return toast('Błąd zapisu: '+r.error.message);if(!r.data?.length)return toast('Nie zapisano. Supabase nie zwrócił rekordu — możliwe RLS.');closeM();await load();toast('Zapisano')}function details(id){let r=raw(id),d=r?.data||{};modal.className='modal on';modal.innerHTML=`<div class="box"><div class="row"><h2>${esc(d.name||d.title||'Szczegóły')}</h2><button class="btn sec" onclick="closeM()">✕</button></div><pre style="white-space:pre-wrap;background:#f8fafc;padding:12px;border-radius:12px">${esc(JSON.stringify(d,null,2))}</pre><button class="btn" onclick="openForm(null,'${id}')">Edytuj</button> <button class="btn danger" onclick="removeItem('${id}')">Usuń</button></div>`}
async function removeItem(id){if(!confirm('Usunąć ten element?'))return;let r=raw(id);if(r?.type==='file'&&r.data?.path)await sb.storage.from('marketing-files').remove([r.data.path]);let del=await sb.from('marketing_items').delete().eq('id',id).select();if(del.error)return toast('Błąd usuwania: '+del.error.message);if(!del.data?.length)return toast('Nie usunięto. Możliwe, że blokuje to RLS albo element już nie istnieje.');closeM();await load();toast('Usunięto')}async function changePass(){let a=np1.value,b=np2.value;if(a.length<6)return toast('Hasło min. 6 znaków');if(a!==b)return toast('Hasła nie są takie same');let r=await sb.auth.updateUser({password:a});toast(r.error?r.error.message:'Hasło zmienione')}
async function seed(){let rows=[['task',{title:'Przygotować mailing',status:'Do zrobienia',priority:'Wysoki',due:'2026-07-01'}],['project',{name:'Kampania webinarowa',kind:'Kampania',status:'W trakcie',budget:'4200',due:'2026-07-10'}],['event',{name:'Webinar Rejestracja 2.0',kind:'Webinar',calendar_bucket:'Webinary',date:'2026-07-10',status:'W przygotowaniu'}],['social',{title:'Post zapraszający na webinar',channel:'LinkedIn',date:'2026-06-28',status:'Draft'}],['warehouse',{name:'Roll-up FELG Dent',place:'Garaż',qty:'3',min:'1'}],['warehouse',{name:'Smycze',place:'Biuro',qty:'120',min:'50'}],['finance',{name:'Canva Pro',marketing_for:'Narzędzie do projektowania grafik marketingowych i social media',kind:'Subskrypcja',tool_name:'Canva Pro',status:'Automatycznie pobierane',amount:'55',currency:'PLN',due:'2026-07-01',is_subscription:'Tak',auto_charge:'Tak',payment_method:'Automatycznie z karty'}]];let r=await sb.from('marketing_items').insert(rows.map(x=>({type:x[0],data:x[1],visibility:'team',owner_id:S.user.id}))).select();if(r.error)return toast('Błąd danych startowych: '+r.error.message);await load();toast('Dodano dane startowe')}async function downloadFile(id){let r=raw(id);let s=await sb.storage.from('marketing-files').createSignedUrl(r.data.path,60);if(s.error)return toast(s.error.message);window.open(s.data.signedUrl,'_blank')}window.addEventListener('change',async e=>{if(e.target.id==='fileInput'){for(let f of e.target.files){let path=S.user.id+'/'+Date.now()+'-'+f.name;let up=await sb.storage.from('marketing-files').upload(path,f);if(up.error){toast(up.error.message);continue}await sb.from('marketing_items').insert({type:'file',data:{name:f.name,size:f.size,path},visibility:'team',owner_id:S.user.id})}await load()}});init();
</script></body></html>
