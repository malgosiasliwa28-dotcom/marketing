<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Magazyn</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Arial;background:#f5f7fb;color:#111827}.wrap{max-width:1100px;margin:28px auto;padding:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:18px;box-shadow:0 14px 40px #0f172a10}.item{display:flex;justify-content:space-between;align-items:center;border:1px solid #e5e7eb;border-radius:16px;padding:12px;margin:8px 0}.btn{border:0;border-radius:14px;padding:10px 14px;background:#2563eb;color:white;font-weight:700;cursor:pointer}.btn.sec{background:white;color:#111827;border:1px solid #e5e7eb}.btn.del{background:#ef4444}.hint{color:#64748b}.inp{width:100%;padding:12px;border:1px solid #e5e7eb;border-radius:14px;margin:6px 0}@media(max-width:800px){.grid{grid-template-columns:1fr}.top{display:block}}</style></head><body><div class="wrap"><div class="top"><div><h1>Magazyn marketingu</h1><p class="hint">Osobno: Biuro i Garaż</p></div><p><a href="/">Wróć do aplikacji</a></p></div><div class="card"><h2>Dodaj rzecz</h2><input id="name" class="inp" placeholder="Nazwa"><input id="qty" class="inp" type="number" placeholder="Ilość"><select id="place" class="inp"><option>Biuro</option><option>Garaż</option></select><input id="cat" class="inp" placeholder="Kategoria / opis"><button id="add" class="btn">Dodaj do magazynu</button><p id="msg" class="hint"></p></div><br><div class="grid"><div class="card"><h2>Biuro</h2><div id="office"></div></div><div class="card"><h2>Garaż</h2><div id="garage"></div></div></div></div><script>const cfg=JSON.parse(localStorage.getItem('mh-config')||'{}');const msg=document.getElementById('msg');if(!cfg.supabaseUrl||!cfg.supabaseAnonKey){msg.textContent='Brak konfiguracji Supabase. Wróć do aplikacji i skonfiguruj Supabase.'}const sb=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);let user=null;function esc(x){return String(x||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}async function init(){const s=await sb.auth.getSession();user=s.data.session&&s.data.session.user;if(!user){msg.textContent='Nie jesteś zalogowana. Wróć do aplikacji i zaloguj się.';return}load()}async function load(){const r=await sb.from('marketing_items').select('*').eq('type','warehouse').order('created_at',{ascending:false});if(r.error){msg.textContent=r.error.message;return}render(r.data||[])}function render(items){office.innerHTML='';garage.innerHTML='';items.forEach(row=>{const d=row.data||{};const html='<div class="item"><div><b>'+esc(d.name)+'</b><p class="hint">'+esc(d.cat||'')+' · '+esc(d.qty||0)+' szt.</p></div><button class="btn del" onclick="del(\''+row.id+'\')">Usuń</button></div>';if(d.place==='Garaż')garage.innerHTML+=html;else office.innerHTML+=html});if(!office.innerHTML)office.innerHTML='<p class="hint">Pusto.</p>';if(!garage.innerHTML)garage.innerHTML='<p class="hint">Pusto.</p>'}add.onclick=async()=>{const data={name:name.value,qty:Number(qty.value)||0,place:place.value,cat:cat.value};if(!data.name){msg.textContent='Wpisz nazwę.';return}const r=await sb.from('marketing_items').insert({type:'warehouse',data,visibility:'team',owner_id:user.id});if(r.error){msg.textContent=r.error.message;return}name.value='';qty.value='';cat.value='';msg.textContent='Dodano.';load()};async function del(id){if(!confirm('Usunąć?'))return;const r=await sb.from('marketing_items').delete().eq('id',id);if(r.error){msg.textContent=r.error.message;return}load()}init()</script></body></html>
